<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>廢墟公會</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a0f;color:#d4c9a0;min-height:100vh;overflow-x:hidden}

/* Login */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;background:radial-gradient(ellipse at center,#2a2a15 0%,#1a1a0f 70%)}
#login h1{font-size:32px;font-weight:700;color:#c9a84c;letter-spacing:0.1em;text-shadow:0 0 20px #c9a84c44}
#login p{font-size:13px;color:#666;margin-top:-8px}
#login input{padding:10px 16px;font-size:15px;border-radius:8px;border:1px solid #444;background:#2a2a15;color:#d4c9a0;width:240px;text-align:center;outline:none}
#login input:focus{border-color:#c9a84c}
#login button{padding:10px 32px;font-size:15px;border-radius:8px;border:none;background:#c9a84c;color:#1a1a0f;font-weight:700;cursor:pointer;letter-spacing:0.05em}
#login button:hover{background:#e0bc5e}
#login .hint{font-size:11px;color:#555;text-align:center;max-width:260px;line-height:1.6}

/* Main layout */
#app{display:none;height:100vh;display:none;flex-direction:column}
#topbar{background:#111108;border-bottom:1px solid #333;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
#topbar .guild{font-size:14px;font-weight:700;color:#c9a84c}
#topbar .res-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.res{font-size:12px;color:#d4c9a0;display:flex;align-items:center;gap:3px}
.res span{font-size:11px;color:#666}
#sync{font-size:10px;color:#444}

#main{display:flex;flex:1;overflow:hidden}

/* Map */
#map-panel{flex:1;overflow:auto;padding:10px;background:#1a1a0f;position:relative}
#map-wrap{display:inline-block}
#map-grid{display:grid;gap:2px;width:max-content}
.tile{width:52px;height:52px;border-radius:4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:20px;position:relative;border:1px solid transparent;transition:transform 0.1s,border-color 0.1s;flex-shrink:0;user-select:none}
.tile:hover{transform:scale(1.08);z-index:2}
.tile.fog{background:#111108;border-color:#1f1f10;cursor:default;font-size:14px;color:#333}
.tile.fog:hover{transform:none}
.tile.locked{background:#1c1c0e;border-color:#2a2a18;cursor:pointer}
.tile.locked:hover{border-color:#c9a84c88}
.tile.clearing{background:#252510;border-color:#c9a84c44;animation:pulse 1.5s infinite}
.tile.road{background:#2a2a1a;border-color:#4a4a2a}
.tile.empty{background:#1e2010;border-color:#2a2e14}
.tile.settlement{background:#1a2a1a;border-color:#3a5a2a}
.tile.capital{background:#1a2a1a;border-color:#c9a84c;box-shadow:0 0 8px #c9a84c44}
.tile.farm{background:#1e2a12;border-color:#4a6a20}
.tile.mine{background:#2a1e12;border-color:#6a4a20}
.tile.forest{background:#162210;border-color:#2a4a18}
.tile.lake{background:#101e2a;border-color:#1a3a5a}
.tile.ruin{background:#2a1a1a;border-color:#5a2a2a}
.tile.connected{box-shadow:inset 0 0 0 2px #c9a84c33}
.tile .lv{position:absolute;bottom:1px;right:3px;font-size:9px;color:#888;font-weight:600}
.tile .prog{position:absolute;bottom:0;left:0;height:3px;background:#c9a84c;border-radius:0 0 4px 4px;transition:width 0.5s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* Side panel */
#side{width:240px;background:#111108;border-left:1px solid #222;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#side-tabs{display:flex;border-bottom:1px solid #222;flex-shrink:0}
.stab{flex:1;padding:8px 4px;font-size:11px;background:transparent;border:none;cursor:pointer;color:#555;transition:all 0.15s;text-align:center}
.stab.active{color:#c9a84c;border-bottom:2px solid #c9a84c}
.stab:hover{color:#d4c9a0}
#side-content{flex:1;overflow-y:auto;padding:10px}

.s-title{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin:10px 0 6px}
.s-title:first-child{margin-top:0}
.info-card{background:#1a1a0e;border:1px solid #2a2a18;border-radius:6px;padding:8px 10px;margin-bottom:6px}
.info-name{font-size:13px;font-weight:600;color:#d4c9a0}
.info-sub{font-size:11px;color:#666;margin-top:2px;line-height:1.5}
.info-cost{font-size:11px;color:#888;margin-top:4px}
.btn{padding:5px 10px;font-size:11px;border:1px solid #444;border-radius:5px;background:transparent;cursor:pointer;color:#aaa;transition:all 0.15s;width:100%;margin-top:6px}
.btn:hover{background:#2a2a18;color:#d4c9a0}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.btn-gold{background:#2a2010;color:#c9a84c;border-color:#5a4a20}
.btn-gold:hover:not(:disabled){background:#3a3015;color:#e0bc5e}
.btn-green{background:#102010;color:#6aaa40;border-color:#2a5a18}
.btn-green:hover:not(:disabled){background:#183018}

.player-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1a10}
.player-row:last-child{border-bottom:none}
.player-name{font-size:12px;color:#d4c9a0}
.player-stats{font-size:10px;color:#555}

.log-entry{font-size:11px;color:#666;line-height:1.8;border-bottom:1px solid #1a1a10;padding:2px 0}
.log-time{font-size:10px;color:#444;margin-right:4px}

.prog-bar{height:4px;background:#1a1a10;border-radius:2px;margin-top:4px;overflow:hidden}
.prog-fill{height:100%;background:#c9a84c;border-radius:2px;transition:width 0.5s}

/* Tile info popup */
#tile-info{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#111108;border:1px solid #444;border-radius:10px;padding:12px 16px;z-index:100;min-width:220px;max-width:300px;display:none;box-shadow:0 4px 20px #00000088}
#tile-info h3{font-size:14px;color:#c9a84c;margin-bottom:4px}
#tile-info p{font-size:12px;color:#888;line-height:1.5}
#tile-info .actions{margin-top:8px;display:flex;flex-direction:column;gap:5px}
#tile-info-close{position:absolute;top:6px;right:8px;background:none;border:none;color:#555;cursor:pointer;font-size:16px}

.empty-msg{font-size:12px;color:#444;text-align:center;padding:20px 10px;line-height:1.6}

/* Mobile */
@media(max-width:600px){
  #side{width:100%;height:220px;border-left:none;border-top:1px solid #222;flex-shrink:0}
  #main{flex-direction:column}
  .tile{width:44px;height:44px;font-size:17px}
}
</style>
</head>
<body>

<div id="login">
  <h1>☢️ 廢墟公會</h1>
  <p>核戰後的廢土重建計畫</p>
  <input type="text" id="nick-input" placeholder="輸入你的名字" maxlength="10">
  <button onclick="enterGame()">進入廢土</button>
  <div class="hint">所有玩家共享同一張地圖<br>輸入相同名字可繼續上次進度</div>
</div>

<div id="app">
  <div id="topbar">
    <div class="guild">☢️ 廢墟公會 <span style="font-size:11px;color:#666" id="city-lv"></span></div>
    <div class="res-row">
      <div class="res">💰<b id="r-gold">0</b><span id="rr-gold"></span></div>
      <div class="res">🌾<b id="r-food">0</b><span id="rr-food"></span></div>
      <div class="res">⚙️<b id="r-parts">0</b><span id="rr-parts"></span></div>
      <div class="res">⚡<b id="r-power">0</b></div>
    </div>
    <div id="sync">●</div>
  </div>

  <div id="main">
    <div id="map-panel">
      <div id="map-wrap"><div id="map-grid"></div></div>
    </div>
    <div id="side">
      <div id="side-tabs">
        <button class="stab active" onclick="showSideTab('build',this)">🏗️建造</button>
        <button class="stab" onclick="showSideTab('players',this)">👥玩家</button>
        <button class="stab" onclick="showSideTab('log',this)">📜戰報</button>
      </div>
      <div id="side-content"></div>
    </div>
  </div>
</div>

<div id="tile-info">
  <button id="tile-info-close" onclick="closeTileInfo()">✕</button>
  <h3 id="ti-title"></h3>
  <p id="ti-desc"></p>
  <div class="actions" id="ti-actions"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuyxUGnWK6fwQ_1-p1GJIyQC7uqAUKtww",
  authDomain: "ruin-guide.firebaseapp.com",
  databaseURL: "https://ruin-guide-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ruin-guide",
  storageBucket: "ruin-guide.firebasestorage.app",
  messagingSenderId: "507865743667",
  appId: "1:507865743667:web:274094e94f049cfbbe7e46"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── Map definition ──
const COLS = 12, ROWS = 10;
const CAPITAL_IDX = Math.floor(ROWS/2)*COLS + Math.floor(COLS/2); // center

// Tile types
const T = {
  FOG:'fog', LOCKED:'locked', EMPTY:'empty', ROAD:'road',
  CAPITAL:'capital', SETTLEMENT:'settlement',
  FARM:'farm', MINE:'mine', FOREST:'forest', LAKE:'lake', RUIN:'ruin'
};

// Buildings you can place on empty tiles
const BUILDINGS = [
  {id:'road',   name:'道路',     icon:'🛤️', desc:'連接聚落，讓資源流通。沒有道路連回主基地的建築無法生產。', cost:{gold:20},        produces:{},          type:'road'},
  {id:'farm',   name:'農場',     icon:'🌾', desc:'生產食物，每級每秒 +0.5 食物。', cost:{gold:60,parts:10}, produces:{food:0.5},  type:'farm'},
  {id:'mine',   name:'礦場',     icon:'⚙️', desc:'生產零件，每級每秒 +0.3 零件。', cost:{gold:80,parts:5},  produces:{parts:0.3}, type:'mine'},
  {id:'settlement',name:'聚落', icon:'🏘️', desc:'增加金幣收入，每級每秒 +1 金幣。需要道路連接主基地才有效。', cost:{gold:100,food:20},produces:{gold:1},    type:'settlement'},
  {id:'power',  name:'發電機',   icon:'⚡', desc:'提供電力。部分升級需要電力。每座提供 +3 電力。', cost:{gold:150,parts:30},produces:{power:3},   type:'power'},
];

const UPGRADES_DEF = [
  {id:'capital1', name:'主基地升級 Lv2', desc:'解鎖更多地圖格子，金幣上限 x2', cost:{gold:500,parts:50,food:30}, effect:'capital_lv2', req:{}},
  {id:'capital2', name:'主基地升級 Lv3', desc:'解鎖全部地圖，解鎖遺跡清除', cost:{gold:1500,parts:150,food:100}, effect:'capital_lv3', req:{capital_lv:2}},
  {id:'goldcap',  name:'強化金庫',       desc:'金幣上限再 x2',                  cost:{gold:300,parts:40},          effect:'goldcap',    req:{}},
  {id:'faster',   name:'生產加速',       desc:'所有建築生產速度 +50%',           cost:{gold:400,food:50,parts:30},  effect:'faster',     req:{capital_lv:2}},
  {id:'roads2',   name:'道路升級',       desc:'道路建造費用 -50%',              cost:{gold:200,parts:20},          effect:'roads2',     req:{}},
];

// Ruin clear rewards
const RUIN_REWARDS = [
  {gold:[20,60],parts:[5,15],food:[0,10]},
  {gold:[50,120],parts:[15,40],food:[5,20]},
  {gold:[100,250],parts:[30,80],food:[10,40]},
];

let myName = '';
let W = null; // world state (shared)
let sideTab = 'build';
let selectedTile = null;
let saveTimer = null;
let tickInterval = null;

function defaultWorld() {
  const tiles = [];
  for(let i=0;i<COLS*ROWS;i++){
    const col=i%COLS, row=Math.floor(i/COLS);
    const cx=Math.floor(COLS/2), cy=Math.floor(ROWS/2);
    const dist=Math.abs(col-cx)+Math.abs(row-cy);
    let type=T.FOG;
    if(i===CAPITAL_IDX) type=T.CAPITAL;
    else if(dist<=2) type=T.LOCKED;
    tiles.push({type, level:type===T.CAPITAL?1:0, clearing:false, clearStart:0, clearTime:0});
  }
  // scatter some natural features in locked/fog tiles
  const features=[T.FARM,T.MINE,T.FOREST,T.LAKE,T.RUIN];
  for(let i=0;i<COLS*ROWS;i++){
    if(tiles[i].type===T.FOG){
      const r=Math.random();
      if(r<0.06) tiles[i].natural=T.RUIN;
      else if(r<0.14) tiles[i].natural=T.FOREST;
      else if(r<0.20) tiles[i].natural=T.LAKE;
    } else if(tiles[i].type===T.LOCKED){
      const r=Math.random();
      if(r<0.15) tiles[i].natural=T.RUIN;
      else if(r<0.28) tiles[i].natural=T.FOREST;
    }
  }
  return {
    tiles, capital_lv:1,
    gold:100, food:0, parts:10, power:0,
    goldCap:1000,
    upgrades:{},
    log:[],
    players:{},
    lastTick: Date.now(),
  };
}

function fmt(n){return Math.floor(n>=1000?n/1000*10/10:n).toLocaleString()+(n>=1000?'k':'');}
function fmtFull(n){return Math.floor(n).toLocaleString();}
function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function resPretty(k){return{gold:'💰',food:'🌾',parts:'⚙️',power:'⚡'}[k]||k;}

// ── Connectivity check ──
function buildAdjacency(){
  // BFS from capital, through road/settlement/farm/mine/power tiles
  const passable=new Set([T.ROAD,T.SETTLEMENT,T.FARM,T.MINE,T.CAPITAL,T.RUIN,'power']);
  const visited=new Set();
  const queue=[CAPITAL_IDX];
  visited.add(CAPITAL_IDX);
  while(queue.length){
    const idx=queue.shift();
    const col=idx%COLS, row=Math.floor(idx/COLS);
    const neighbors=[];
    if(col>0) neighbors.push(idx-1);
    if(col<COLS-1) neighbors.push(idx+1);
    if(row>0) neighbors.push(idx-COLS);
    if(row<ROWS-1) neighbors.push(idx+COLS);
    for(const n of neighbors){
      if(!visited.has(n)&&W.tiles[n]&&passable.has(W.tiles[n].type)){
        visited.add(n);
        queue.push(n);
      }
    }
  }
  return visited;
}

function getConnected(){
  return buildAdjacency();
}

// ── Production rates ──
function calcRates(){
  const connected=getConnected();
  const faster=W.upgrades.faster?1.5:1;
  let gold=0,food=0,parts=0,power=0;
  for(let i=0;i<W.tiles.length;i++){
    const t=W.tiles[i];
    const lv=t.level||1;
    const conn=connected.has(i);
    if(!conn&&t.type!==T.CAPITAL&&t.type!==T.EMPTY&&t.type!==T.LOCKED&&t.type!==T.FOG&&t.type!==T.ROAD) continue;
    if(t.type===T.CAPITAL)   gold+=lv*0.5*faster;
    if(t.type===T.SETTLEMENT&&conn) gold+=lv*1*faster;
    if(t.type===T.FARM&&conn)       food+=lv*0.5*faster;
    if(t.type===T.MINE&&conn)       parts+=lv*0.3*faster;
    if(t.type==='power'&&conn)      power+=3;
  }
  return {gold,food,parts,power:Math.floor(power)};
}

// ── Save/load ──
async function saveWorld(){
  if(!W) return;
  W.lastTick=Date.now();
  try{
    await set(ref(db,'world2'),W);
    document.getElementById('sync').textContent='✅';
    document.getElementById('sync').style.color='#4a6a30';
  }catch(e){
    document.getElementById('sync').textContent='⚠️';
    document.getElementById('sync').style.color='#8a3a20';
  }
}

function scheduleSave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(saveWorld,2000);
}

function addLog(msg){
  if(!W.log) W.log=[];
  const now=new Date();
  const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  W.log.unshift({t,msg,who:myName});
  if(W.log.length>100) W.log.pop();
}

// ── Tick ──
function tick(){
  if(!W) return;
  const now=Date.now();
  const dt=Math.min((now-(W.lastTick||now))/1000,300);
  W.lastTick=now;
  const rates=calcRates();
  W.gold=Math.min(W.goldCap||1000,W.gold+rates.gold*dt);
  W.food=Math.min(9999,W.food+rates.food*dt);
  W.parts=Math.min(9999,W.parts+rates.parts*dt);
  W.power=rates.power;

  // check clearing
  let changed=false;
  for(let i=0;i<W.tiles.length;i++){
    const t=W.tiles[i];
    if(t.clearing){
      const elapsed=(now-t.clearStart)/1000;
      if(elapsed>=t.clearTime){
        t.clearing=false;
        t.type=t.natural||T.EMPTY;
        t.level=1;
        // reward if ruin
        if(t.natural===T.RUIN){
          const tier=Math.min(2,Math.floor(W.capital_lv/1));
          const r=RUIN_REWARDS[tier];
          const g=rnd(...r.gold),p=rnd(...r.parts),f=rnd(...r.food);
          W.gold=Math.min(W.goldCap||1000,W.gold+g);
          W.parts=Math.min(9999,W.parts+p);
          W.food=Math.min(9999,W.food+f);
          addLog(`🏚️ ${myName} 清除遺跡！獲得 💰${g} ⚙️${p} 🌾${f}`);
        } else {
          addLog(`✅ ${myName} 開墾了新土地`);
        }
        // unlock adjacent fog
        unlockAdjacent(i);
        changed=true;
      }
    }
  }
  updateTopbar(rates);
  if(changed){renderMap();scheduleSave();}
}

function unlockAdjacent(idx){
  const col=idx%COLS,row=Math.floor(idx/COLS);
  const neighbors=[];
  if(col>0) neighbors.push(idx-1);
  if(col<COLS-1) neighbors.push(idx+1);
  if(row>0) neighbors.push(idx-COLS);
  if(row<ROWS-1) neighbors.push(idx+COLS);
  for(const n of neighbors){
    if(W.tiles[n]&&W.tiles[n].type===T.FOG){
      W.tiles[n].type=T.LOCKED;
    }
  }
}

function updateTopbar(rates){
  if(!W) return;
  document.getElementById('r-gold').textContent=fmtFull(Math.floor(W.gold));
  document.getElementById('r-food').textContent=fmtFull(Math.floor(W.food));
  document.getElementById('r-parts').textContent=fmtFull(Math.floor(W.parts));
  document.getElementById('r-power').textContent=W.power||0;
  const r=rates||calcRates();
  document.getElementById('rr-gold').textContent=r.gold>0?`+${r.gold.toFixed(1)}/s`:'';
  document.getElementById('rr-food').textContent=r.food>0?`+${r.food.toFixed(1)}/s`:'';
  document.getElementById('rr-parts').textContent=r.parts>0?`+${r.parts.toFixed(1)}/s`:'';
  document.getElementById('city-lv').textContent=`主基地 Lv${W.capital_lv||1}`;
}

// ── Map rendering ──
function tileIcon(t){
  if(t.clearing) return '⏳';
  const icons={
    [T.FOG]:'🌫️',[T.LOCKED]:'🔒',[T.EMPTY]:'🟫',[T.ROAD]:'🛤️',
    [T.CAPITAL]:'🏰',[T.SETTLEMENT]:'🏘️',
    [T.FARM]:'🌾',[T.MINE]:'⚙️',[T.FOREST]:'🌲',[T.LAKE]:'💧',
    [T.RUIN]:'🏚️',power:'⚡',
  };
  return icons[t.type]||'❓';
}

function renderMap(){
  if(!W) return;
  const grid=document.getElementById('map-grid');
  const connected=getConnected();
  grid.style.gridTemplateColumns=`repeat(${COLS},52px)`;

  // update existing tiles or create
  const existing=grid.children;
  if(existing.length!==W.tiles.length){
    grid.innerHTML='';
    W.tiles.forEach((_,i)=>{
      const el=document.createElement('div');
      el.className='tile';
      el.onclick=()=>onTileClick(i);
      grid.appendChild(el);
    });
  }
  const children=grid.children;
  for(let i=0;i<W.tiles.length;i++){
    const t=W.tiles[i];
    const el=children[i];
    const type=t.clearing?'clearing':t.type;
    el.className='tile '+type+(connected.has(i)&&t.type!==T.FOG&&t.type!==T.LOCKED?' connected':'');
    el.innerHTML='';
    const icon=document.createElement('span');
    icon.textContent=tileIcon(t);
    el.appendChild(icon);
    if(t.level>1){
      const lv=document.createElement('div');
      lv.className='lv';
      lv.textContent='Lv'+t.level;
      el.appendChild(lv);
    }
    if(t.clearing&&t.clearTime>0){
      const elapsed=(Date.now()-t.clearStart)/1000;
      const pct=Math.min(100,elapsed/t.clearTime*100);
      const pb=document.createElement('div');
      pb.className='prog';
      pb.style.width=pct+'%';
      el.appendChild(pb);
    }
  }
}

// ── Tile click ──
function onTileClick(idx){
  selectedTile=idx;
  const t=W.tiles[idx];
  const info=document.getElementById('tile-info');
  const connected=getConnected();
  const isConn=connected.has(idx);

  let title='',desc='',actions=[];

  if(t.type===T.FOG){
    closeTileInfo();return;
  } else if(t.type===T.LOCKED||t.natural){
    const natural=t.natural;
    const timeMap={[T.RUIN]:30,[T.FOREST]:20,[T.LAKE]:25};
    const baseTime=timeMap[natural]||15;
    const cost={gold: natural===T.RUIN?80:natural===T.FOREST?40:50};
    title=(t.clearing?'⏳ 清理中':natural==='ruin'?'🏚️ 廢墟':natural==='forest'?'🌲 森林':natural==='lake'?'💧 湖泊':'🔒 荒地');
    desc=t.clearing?`正在清理中，完成後解鎖此格`:`清理後可在此建造，需要 ${baseTime} 秒。${natural===T.RUIN?'清除遺跡有機率獲得額外獎勵！':''}`;
    if(!t.clearing){
      const canAfford=Object.entries(cost).every(([k,v])=>(W[k]||0)>=v);
      const costStr=Object.entries(cost).map(([k,v])=>`${resPretty(k)}${v}`).join(' ');
      actions.push(`<button class="btn btn-gold" ${canAfford?'':'disabled'} onclick="clearTile(${idx})">清理 (${costStr})</button>`);
    }
  } else if(t.type===T.CAPITAL){
    title=`🏰 主基地 Lv${t.level}`;
    desc=`這是你們的主基地，所有道路必須連回這裡才能讓建築運作。升級後解鎖更多功能。`;
    const nextUpg=UPGRADES_DEF.find(u=>u.effect===`capital_lv${(W.capital_lv||1)+1}`);
    if(nextUpg&&!W.upgrades[nextUpg.id]){
      const costStr=Object.entries(nextUpg.cost).map(([k,v])=>`${resPretty(k)}${v}`).join(' ');
      const canAfford=Object.entries(nextUpg.cost).every(([k,v])=>(W[k]||0)>=v);
      actions.push(`<button class="btn btn-gold" ${canAfford?'':'disabled'} onclick="doUpgrade('${nextUpg.id}')">升級主基地 (${costStr})</button>`);
    }
  } else if(t.type===T.EMPTY){
    title='🟫 空地';
    desc=isConn?'這塊空地已連接主基地，可以建造。':'這塊空地尚未連接主基地，建造道路連接後才能生產資源。';
    BUILDINGS.forEach(b=>{
      const costStr=Object.entries(b.cost).map(([k,v])=>`${resPretty(k)}${v}`).join(' ');
      const canAfford=Object.entries(b.cost).every(([k,v])=>(W[k]||0)>=v);
      actions.push(`<button class="btn ${canAfford?'btn-green':''}" ${canAfford?'':'disabled'} onclick="buildOn(${idx},'${b.id}')">${b.icon} 建造${b.name} (${costStr})</button>`);
    });
  } else if([T.SETTLEMENT,T.FARM,T.MINE,T.RUIN,'power'].includes(t.type)){
    const b=BUILDINGS.find(x=>x.type===t.type)||{name:t.type,icon:'🏗️',desc:'建築'};
    title=`${tileIcon(t)} ${b.name||t.type} Lv${t.level}`;
    const prodStr=b.produces&&Object.keys(b.produces).length?Object.entries(b.produces).map(([k,v])=>`${resPretty(k)}+${(v*(t.level||1)*(W.upgrades.faster?1.5:1)).toFixed(1)}/s`).join(' '):'';
    desc=`${b.desc||''}\n${prodStr?'目前生產：'+prodStr:''}\n${isConn?'✅ 已連接主基地':'⚠️ 未連接主基地，無法生產'}`;
    // upgrade
    const upgCost={gold:80*(t.level||1),parts:20*(t.level||1)};
    const canUpg=Object.entries(upgCost).every(([k,v])=>(W[k]||0)>=v);
    const upgStr=Object.entries(upgCost).map(([k,v])=>`${resPretty(k)}${v}`).join(' ');
    actions.push(`<button class="btn btn-gold" ${canUpg?'':'disabled'} onclick="upgradeBuilding(${idx})">升級至 Lv${(t.level||1)+1} (${upgStr})</button>`);
    // demolish
    actions.push(`<button class="btn" onclick="demolish(${idx})">拆除（退回 50% 資源）</button>`);
  } else if(t.type===T.ROAD){
    title='🛤️ 道路';
    desc=isConn?'已連接主基地，附近建築可以生產資源。':'此道路未連接主基地。';
    actions.push(`<button class="btn" onclick="demolish(${idx})">拆除道路</button>`);
  } else if(t.type===T.FOREST){
    title='🌲 森林';
    desc='天然森林，可以伐木獲得零件。';
    const canAfford=(W.gold||0)>=30;
    actions.push(`<button class="btn btn-gold" ${canAfford?'':'disabled'} onclick="harvestForest(${idx})">伐木 (💰30)</button>`);
  } else if(t.type===T.LAKE){
    title='💧 湖泊';
    desc='天然湖泊，可以捕魚獲得食物。';
    const canAfford=(W.gold||0)>=20;
    actions.push(`<button class="btn btn-gold" ${canAfford?'':'disabled'} onclick="harvestLake(${idx})">捕魚 (💰20)</button>`);
  }

  document.getElementById('ti-title').textContent=title;
  document.getElementById('ti-desc').textContent=desc;
  document.getElementById('ti-actions').innerHTML=actions.join('');
  info.style.display='block';
}

window.closeTileInfo=function(){
  document.getElementById('tile-info').style.display='none';
  selectedTile=null;
}

window.clearTile=function(idx){
  const t=W.tiles[idx];
  if(t.clearing) return;
  const natural=t.natural;
  const timeMap={[T.RUIN]:30,[T.FOREST]:20,[T.LAKE]:25};
  const cost={gold:natural===T.RUIN?80:natural===T.FOREST?40:50};
  for(const[k,v]of Object.entries(cost)){
    if((W[k]||0)<v){alert(`${resPretty(k)}不足`);return;}
    W[k]-=v;
  }
  const baseTime=timeMap[natural]||15;
  t.clearing=true;
  t.clearStart=Date.now();
  t.clearTime=baseTime;
  t.type=T.LOCKED;
  addLog(`🔨 ${myName} 開始清理土地`);
  closeTileInfo();
  renderMap();
  scheduleSave();
}

window.buildOn=function(idx,buildingId){
  const b=BUILDINGS.find(x=>x.id===buildingId);
  if(!b) return;
  for(const[k,v]of Object.entries(b.cost)){
    if((W[k]||0)<v){alert(`${resPretty(k)}不足`);return;}
    W[k]-=v;
  }
  const t=W.tiles[idx];
  t.type=b.type;
  t.level=1;
  addLog(`🏗️ ${myName} 建造了 ${b.icon}${b.name}`);
  closeTileInfo();
  renderMap();
  scheduleSave();
}

window.upgradeBuilding=function(idx){
  const t=W.tiles[idx];
  const lv=t.level||1;
  const cost={gold:80*lv,parts:20*lv};
  for(const[k,v]of Object.entries(cost)){
    if((W[k]||0)<v){alert(`${resPretty(k)}不足`);return;}
    W[k]-=v;
  }
  t.level=lv+1;
  addLog(`⬆️ ${myName} 升級了建築至 Lv${lv+1}`);
  closeTileInfo();
  renderMap();
  scheduleSave();
}

window.demolish=function(idx){
  const t=W.tiles[idx];
  const b=BUILDINGS.find(x=>x.type===t.type);
  if(b){
    Object.entries(b.cost).forEach(([k,v])=>{W[k]=(W[k]||0)+Math.floor(v*0.5);});
  }
  t.type=T.EMPTY;
  t.level=0;
  addLog(`🔨 ${myName} 拆除了建築`);
  closeTileInfo();
  renderMap();
  scheduleSave();
}

window.harvestForest=function(idx){
  if((W.gold||0)<30){alert('💰不足');return;}
  W.gold-=30;
  const p=rnd(8,20);
  W.parts=Math.min(9999,(W.parts||0)+p);
  addLog(`🌲 ${myName} 伐木獲得 ⚙️${p}`);
  closeTileInfo();
  scheduleSave();
}

window.harvestLake=function(idx){
  if((W.gold||0)<20){alert('💰不足');return;}
  W.gold-=20;
  const f=rnd(10,25);
  W.food=Math.min(9999,(W.food||0)+f);
  addLog(`💧 ${myName} 捕魚獲得 🌾${f}`);
  closeTileInfo();
  scheduleSave();
}

window.doUpgrade=function(id){
  const u=UPGRADES_DEF.find(x=>x.id===id);
  if(!u||W.upgrades[id]) return;
  for(const[k,v]of Object.entries(u.cost)){
    if((W[k]||0)<v){alert(`${resPretty(k)}不足`);return;}
    W[k]-=v;
  }
  W.upgrades[id]=true;
  if(u.effect==='capital_lv2'){W.capital_lv=2;W.goldCap=(W.goldCap||1000)*2;unlockRing(2);}
  if(u.effect==='capital_lv3'){W.capital_lv=3;unlockRing(3);}
  if(u.effect==='goldcap'){W.goldCap=(W.goldCap||1000)*2;}
  // update capital tile level
  if(W.tiles[CAPITAL_IDX]) W.tiles[CAPITAL_IDX].level=W.capital_lv||1;
  addLog(`🏰 ${myName} 升級了主基地至 Lv${W.capital_lv}`);
  closeTileInfo();
  renderMap();
  renderSide();
  scheduleSave();
}

function unlockRing(ring){
  const cx=Math.floor(COLS/2),cy=Math.floor(ROWS/2);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const idx=r*COLS+c;
    const dist=Math.abs(c-cx)+Math.abs(r-cy);
    if(dist<=ring+2&&W.tiles[idx].type===T.FOG){
      W.tiles[idx].type=T.LOCKED;
    }
  }
}

// ── Side panel ──
window.showSideTab=function(name,el){
  sideTab=name;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderSide();
}

function renderSide(){
  const c=document.getElementById('side-content');
  if(sideTab==='build') renderBuildTab(c);
  else if(sideTab==='players') renderPlayersTab(c);
  else if(sideTab==='log') renderLogTab(c);
}

function renderBuildTab(c){
  const done=Object.keys(W.upgrades||{});
  const available=UPGRADES_DEF.filter(u=>{
    if(done.includes(u.id)) return false;
    if(u.req.capital_lv&&(W.capital_lv||1)<u.req.capital_lv) return false;
    return true;
  });
  let html='<div class="s-title">研究升級</div>';
  if(available.length===0){
    html+='<div class="empty-msg">所有可用升級已完成</div>';
  } else {
    available.forEach(u=>{
      const costStr=Object.entries(u.cost).map(([k,v])=>`${resPretty(k)}${v}`).join(' ');
      const canAfford=Object.entries(u.cost).every(([k,v])=>(W[k]||0)>=v);
      html+=`<div class="info-card"><div class="info-name">${u.name}</div><div class="info-sub">${u.desc}</div><div class="info-cost">費用：${costStr}</div><button class="btn ${canAfford?'btn-gold':''}" ${canAfford?'':'disabled'} onclick="doUpgrade('${u.id}')">研究</button></div>`;
    });
  }
  html+='<div class="s-title" style="margin-top:12px">建造說明</div>';
  BUILDINGS.forEach(b=>{
    const costStr=Object.entries(b.cost).map(([k,v])=>`${resPretty(k)}${v}`).join(' ');
    html+=`<div class="info-card"><div class="info-name">${b.icon} ${b.name}</div><div class="info-sub">${b.desc}</div><div class="info-cost">${costStr}</div></div>`;
  });
  c.innerHTML=html;
}

function renderPlayersTab(c){
  const players=W.players||{};
  const entries=Object.entries(players);
  let html='<div class="s-title">線上玩家</div>';
  if(entries.length===0){
    html+='<div class="empty-msg">邀請朋友一起重建廢土！</div>';
  } else {
    entries.forEach(([name,data])=>{
      const last=data.lastSeen?Math.floor((Date.now()-data.lastSeen)/60000):999;
      const online=last<5;
      html+=`<div class="player-row"><div><div class="player-name">${online?'🟢':'⚫'} ${name}</div><div class="player-stats">上次在線：${last<1?'剛剛':last+'分鐘前'}</div></div></div>`;
    });
  }
  c.innerHTML=html;
}

function renderLogTab(c){
  const logs=W.log||[];
  let html='<div class="s-title">最近動態</div>';
  if(logs.length===0){
    html+='<div class="empty-msg">還沒有任何動態</div>';
  } else {
    html+=logs.map(e=>`<div class="log-entry"><span class="log-time">${e.t}</span>${e.msg}</div>`).join('');
  }
  c.innerHTML=html;
}

// ── Enter game ──
window.enterGame=async function(){
  const input=document.getElementById('nick-input').value.trim();
  if(!input){alert('請輸入名字');return;}
  myName=input;

  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';

  // load world
  const snap=await get(ref(db,'world2'));
  if(snap.exists()){
    W=snap.val();
    if(!W.upgrades) W.upgrades={};
    if(!W.log) W.log=[];
    if(!W.players) W.players={};
    // offline tick
    const now=Date.now();
    const dt=Math.min((now-(W.lastTick||now))/1000,600);
    if(dt>2){
      const rates=calcRates();
      W.gold=Math.min(W.goldCap||1000,W.gold+rates.gold*dt);
      W.food=Math.min(9999,W.food+rates.food*dt);
      W.parts=Math.min(9999,W.parts+rates.parts*dt);
    }
    W.lastTick=now;
  } else {
    W=defaultWorld();
    addLog('☢️ 廢墟公會建立！核戰後的重建開始了');
    await saveWorld();
  }

  // update player presence
  W.players[myName]={lastSeen:Date.now()};
  addLog(`👤 ${myName} 加入了廢土重建`);

  renderMap();
  renderSide();
  updateTopbar();

  // realtime sync
  onValue(ref(db,'world2'),snap=>{
    if(!snap.exists()) return;
    const remote=snap.val();
    // merge: take remote but keep local rates ticking
    W=remote;
    if(!W.upgrades) W.upgrades={};
    if(!W.log) W.log=[];
    if(!W.players) W.players={};
    renderMap();
    if(sideTab==='log'||sideTab==='players') renderSide();
    updateTopbar();
  });

  tickInterval=setInterval(()=>{
    tick();
    // update player presence every 60s
    if(Math.floor(Date.now()/60000)!==Math.floor((W.players[myName]?.lastSeen||0)/60000)){
      W.players[myName]={lastSeen:Date.now()};
      scheduleSave();
    }
  },1000);
}

window.addEventListener('beforeunload',()=>{if(W) saveWorld();});
</script>
