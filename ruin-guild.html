<style>

n-bottom:8px}.card{background:#1a1a2e;border:1px solid #222;border-radius:10px;padding:12px 14px;margin-bottom:8px}.card-row{display:flex;align-items:center;justify-content:space-between;gap:8px}.hero-name{font-size:14px;font-weight:500;color:#e0e0e0}.hero-sub{font-size:12px;color:#666;margin-top:2px}.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500}.badge-idle{background:#1a2e1a;color:#4caf50;border:1px solid #2d4a2d}.badge-quest{background:#1a2040;color:#5b8dee;border:1px solid #2d3a60}.btn{padding:5px 12px;font-size:12px;border:1px solid #333;border-radius:6px;background:transparent;cursor:pointer;color:#aaa;white-space:nowrap;transition:all 0.15s}.btn:hover{background:#252535;color:#e0e0e0}.btn:disabled{opacity:0.3;cursor:not-allowed}.btn-gold{background:#2a2010;color:#c9a84c;border-color:#4a3a10}.btn-gold:hover:not(:disabled){background:#3a3015;color:#e0bc5e}.btn-blue{background:#1a2040;color:#5b8dee;border-color:#2d3a60}.btn-blue:hover:not(:disabled){background:#222d50}.progress-bar{height:4px;background:#222;border-radius:2px;overflow:hidden;margin-top:6px}.progress-fill{height:100%;background:#5b8dee;border-radius:2px;transition:width 0.5s linear}.progress-label{font-size:10px;color:#555;margin-top:3px}.loot-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}.loot-tag{font-size:10px;padding:2px 6px;background:#111;border-radius:4px;color:#666;border:1px solid #222}.sync-bar{font-size:10px;color:#444;text-align:right;margin-bottom:6px}.log-box{background:#111;border-radius:8px;padding:8px 10px;max-height:200px;overflow-y:auto}.log-entry{font-size:12px;color:#666;line-height:1.8;border-bottom:1px solid #1a1a1a;padding:1px 0}.log-entry:last-child{border-bottom:none}.log-time{font-size:10px;color:#444;margin-right:6px}.empty{font-size:13px;color:#444;text-align:center;padding:24px}.alliance-section{margin-bottom:16px}.player-guild-card{background:#111;border:1px solid #222;border-radius:10px;padding:10px 14px;margin-bottom:6px}.pgc-name{font-size:13px;font-weight:500;color:#c9a84c}.pgc-stats{font-size:11px;color:#555;margin-top:3px}.alliance-project{background:#1a1a2e;border:1px solid #2d3050;border-radius:10px;padding:12px 14px;margin-bottom:8px}.ap-name{font-size:14px;font-weight:500;color:#5b8dee}.ap-desc{font-size:12px;color:#555;margin-top:2px}.ap-bar{height:6px;background:#111;border-radius:3px;overflow:hidden;margin-top:4px}.ap-fill{height:100%;background:#5b8dee;border-radius:3px;transition:width 0.5s}.ap-label{font-size:11px;color:#555;margin-top:3px;display:flex;justify-content:space-between}.contrib-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.expedition-card{background:#1a1a2e;border:1px solid #2d3050;border-radius:10px;padding:12px 14px;margin-bottom:8px}.exp-name{font-size:14px;font-weight:500;color:#e0b060}.exp-desc{font-size:12px;color:#555;margin-top:2px}.exp-req{font-size:11px;color:#444;margin-top:4px}.participant-row{display:flex;align-items:center;gap:8px;margin-top:4px}.participant-name{font-size:12px;color:#aaa}.divider{border:none;border-top:1px solid #1a1a1a;margin:12px 0}.eq-common{color:#aaa}.eq-rare{color:#5b8dee}.eq-epic{color:#c97eee}.eq-card{background:#1a1a2e;border:1px solid #222;border-radius:10px;padding:10px 14px;margin-bottom:6px}.eq-name{font-size:13px;font-weight:500}.eq-stat{font-size:11px;color:#666;margin-top:2px}.eq-equipped{font-size:10px;color:#4caf50;margin-top:2px}</style>

<body>

<div id="login-screen">
  <h1>⚔️ 廢墟公會</h1>
  <p>輸入你的公會名稱來開始遊戲</p>
  <input type="text" id="nickname-input" placeholder="公會名稱（例如：星辰公會）" maxlength="12">
  <button onclick="enterGame()">進入遊戲</button>
</div>

<div id="game">
  <div class="top-header">
    <div>
      <div class="guild-title" id="my-guild-title">⚔️ 我的公會</div>
      <div class="guild-sub">等級 <span id="guild-level">1</span> · 聲望 <span id="guild-fame-top">0</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="sync-bar" id="sync-bar">同步中...</div>
      <div class="player-badge" id="player-badge">玩家</div>
    </div>
  </div>

  <div class="res-bar">
    <div class="res-card"><div class="res-label">💰 金幣</div><div class="res-val" id="res-gold">0</div><div class="res-rate" id="rate-gold"></div></div>
    <div class="res-card"><div class="res-label">🧪 魔素</div><div class="res-val" id="res-mana">0</div><div class="res-rate" id="rate-mana"></div></div>
    <div class="res-card"><div class="res-label">🔩 零件</div><div class="res-val" id="res-parts">0</div></div>
    <div class="res-card"><div class="res-label">✨ 聲望</div><div class="res-val" id="res-fame">0</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('heroes',this)">🧙 冒險者</button>
    <button class="tab" onclick="switchTab('dungeon',this)">🏚️ 地下城</button>
    <button class="tab" onclick="switchTab('upgrade',this)">🏛️ 升級</button>
    <button class="tab" onclick="switchTab('equipment',this)">🗡️ 裝備</button>
    <button class="tab" onclick="switchTab('alliance',this)">🤝 聯盟</button>
    <button class="tab" onclick="switchTab('log',this)">📜 戰報</button>
  </div>

  <div id="tab-heroes" class="panel active">
    <div class="section-title">目前冒險者</div>
    <div id="hero-list"></div>
    <div class="section-title" style="margin-top:12px">雇用新冒險者</div>
    <div id="hire-list"></div>
  </div>
  
  <div id="tab-dungeon" class="panel">
    <div class="section-title">可探索地下城</div>
    <div id="dungeon-list"></div>
  </div>
  
  <div id="tab-upgrade" class="panel">
    <div class="section-title">公會設施</div>
    <div id="upgrade-list"></div>
  </div>
  
  <div id="tab-equipment" class="panel">
    <div class="section-title">倉庫</div>
    <div id="inventory-list"></div>
  </div>
  
  <div id="tab-alliance" class="panel">
    <div class="alliance-section">
      <div class="section-title">聯盟共同建造</div>
      <div id="alliance-projects"></div>
    </div>
    <hr class="divider">
    <div class="alliance-section">
      <div class="section-title">聯合遠征</div>
      <div id="expeditions"></div>
    </div>
    <hr class="divider">
    <div class="alliance-section">
      <div class="section-title">其他公會</div>
      <div id="other-guilds"></div>
    </div>
  </div>
  
  <div id="tab-log" class="panel">
    <div class="section-title">最近戰報</div>
    <div class="log-box" id="log-box"></div>
  </div>
</div>

<script type="module">

import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const HERO_TEMPLATES = [  
  {id:"fighter",name:"鐵拳 葛雷",cls:"戰士",icon:"⚔️",atk:8,spd:1.0,cost:{gold:50},flavor:"老傷滿身，打架第一",unlock:0},  
  {id:"mage",name:"星塵 米蘭",cls:"法師",icon:"🔮",atk:5,spd:0.8,cost:{gold:80,mana:20},flavor:"魔力過剩，偶爾走火",unlock:0},  
  {id:"rogue",name:"暗影 柯爾",cls:"盜賊",icon:"🗡️",atk:6,spd:1.4,cost:{gold:100,mana:10},flavor:"安靜，出手快",unlock:1},  
  {id:"healer",name:"聖光 艾娜",cls:"聖職者",icon:"💊",atk:3,spd:0.7,cost:{gold:120,mana:40},flavor:"補血永遠慢半拍",unlock:1},  
  {id:"archer",name:"狂風 艾絲",cls:"弓箭手",icon:"🏹",atk:7,spd:1.2,cost:{gold:150,mana:30},flavor:"從不喊累",unlock:2},  
  {id:"tank",name:"鐵壁 巴爾",cls:"聖騎士",icon:"🛡️",atk:4,spd:0.6,cost:{gold:200,mana:60,parts:20},flavor:"他的盾幾乎擋住一切",unlock:2},
];

const DUNGEONS = [  
  {id:"cave",name:"幽暗洞窟",icon:"🦇",desc:"入門地下城",req:{heroCount:1,fame:0},time:15,loot:{gold:[5,15],mana:[0,5]},xp:10,fameReward:2},  
  {id:"crypt",name:"古老地穴",icon:"💀",desc:"骷髏橫行的腐蝕地穴",req:{heroCount:2,fame:10},time:25,loot:{gold:[12,25],mana:[5,15],parts:[0,8]},xp:20,fameReward:5},  
  {id:"dungeon",name:"廢棄礦坑",icon:"⛏️",desc:"深入地下，礦物豐富",req:{heroCount:2,fame:30},time:40,loot:{gold:[20,40],mana:[8,20],parts:[5,15]},xp:35,fameReward:8},  
  {id:"tower",name:"魔法師之塔",icon:"🗼",desc:"扭曲空間，魔法陷阱",req:{heroCount:3,fame:60},time:60,loot:{gold:[30,60],mana:[20,50],parts:[5,20]},xp:60,fameReward:15},  
  {id:"abyss",name:"深淵裂縫",icon:"🌑",desc:"古代惡魔沉睡之地",req:{heroCount:4,fame:120},time:90,loot:{gold:[60,120],mana:[40,80],parts:[20,40]},xp:100,fameReward:25},
];

const UPGRADES = [  
  {id:"tavern",  name:"酒館擴建",   desc:"冒險者上限 +2",                 icon:"🍺", levels:[{cost:{gold:100}},{cost:{gold:300,mana:50}},{cost:{gold:600,mana:120,parts:30}}]},  
  {id:"forge",   name:"鍛造工坊",   desc:"攻擊力 +20%",                   icon:"🔨", levels:[{cost:{gold:150,parts:20}},{cost:{gold:400,parts:60}},{cost:{gold:900,parts:150,mana:80}}]},  
  {id:"library", name:"魔法圖書館", desc:"魔素生產 +50%",                 icon:"📚", levels:[{cost:{gold:200,mana:30}},{cost:{gold:500,mana:100}},{cost:{gold:1000,mana:200,parts:50}}]},  
  {id:"scout",   name:"斥候小屋",   desc:"探索速度 +25%",                 icon:"🗺️", levels:[{cost:{gold:300,mana:40}},{cost:{gold:700,mana:100,parts:30}},{cost:{gold:1400,mana:200,parts:80}}]},  
  {id:"clinic",  name:"醫療帳篷",   desc:"受傷恢復速度 +50%",             icon:"🏥", levels:[{cost:{gold:200,mana:30}},{cost:{gold:500,mana:80}},{cost:{gold:1000,mana:200,parts:40}}]},  
  {id:"board",   name:"名聲布告欄", desc:"解鎖更多可雇用冒險者",         icon:"📣", levels:[{cost:{gold:150,fame:10}},{cost:{gold:400,fame:30}},{cost:{gold:800,fame:60}}]},  
  {id:"alchemy", name:"煉金工坊",   desc:"解鎖資源兌換功能",             icon:"🧪", levels:[{cost:{gold:250,mana:50}},{cost:{gold:600,mana:120,parts:30}},{cost:{gold:1200,mana:250,parts:80}}]},  
  {id:"maproom", name:"地圖室",     desc:"顯示地下城裝備掉落機率",       icon:"🗺️", levels:[{cost:{gold:180,parts:25}},{cost:{gold:450,parts:70}},{cost:{gold:900,parts:150,mana:60}}]},  
  {id:"enhance", name:"裝備強化台", desc:"解鎖裝備強化（零件提升數值）", icon:"⚗️", levels:[{cost:{gold:300,parts:50}},{cost:{gold:700,parts:120,mana:50}},{cost:{gold:1400,parts:250,mana:120}}]},  
  {id:"training",name:"訓練場",     desc:"待命冒險者自動獲得經驗值",     icon:"🎯", levels:[{cost:{gold:200,mana:40}},{cost:{gold:500,mana:100,parts:20}},{cost:{gold:1000,mana:200,parts:60}}]},
];

const ALLIANCE_PROJECTS = [  
  {id:"wall",name:"聯盟城牆",icon:"🧱",desc:"所有公會防禦 +10%",totalParts:500,totalGold:200,effect:"全員探索速度 +10%"},  
  {id:"portal",name:"傳送門",icon:"🌀",desc:"解鎖聯合遠征功能",totalMana:400,totalGold:300,effect:"解鎖聯合遠征"},  
  {id:"shrine",name:"英雄神殿",icon:"🏯",desc:"所有冒險者經驗值 +25%",totalFame:100,totalGold:500,effect:"全員經驗值 +25%"},  
];

const EQ_QUALITY = [
  {id:"common", name:"普通", color:"#aaa"},
  {id:"rare", name:"稀有", color:"#5b8dee"},
  {id:"epic", name:"史詩", color:"#c97eee"}
];

let myName=''; let S=null; let activeTab='heroes'; let allianceData={};

function defaultState(name){  
  return {    
    name,gold:100,mana:0,parts:0,fame:0,    
    heroSlots:4,heroes:[],activeQuests:{},questData:{},    
    upgrades:{tavern:0,forge:0,library:0,scout:0,clinic:0,board:0,alchemy:0,maproom:0,enhance:0,training:0},    
    log:[],lastTick:Date.now(),autoQuest:{}, inventory:[], injuries:{}
  };
}

function fmt(n){return Math.floor(n).toLocaleString();}
function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function resPretty(k){return{gold:'💰',mana:'🧪',parts:'🔩',fame:'✨'}[k]||k;}

function getBonus(){  
  const ap = allianceData.projects || {};  
  const wallDone = ap.wall && ap.wall.done;  
  const shrineDone = ap.shrine && ap.shrine.done;  
  return {    
    atkMult:      1+(S.upgrades.forge||0)*0.2,    
    manaRateMult: 1+(S.upgrades.library||0)*0.5,    
    speedMult:    (1+(S.upgrades.scout||0)*0.25)*(wallDone?1.1:1),    
    goldCap:      500000,    
    xpMult:       shrineDone?1.25:1,    
    healMult:     1+((S.upgrades.clinic||0)*0.5),    
    trainXpRate:  (S.upgrades.training||0)*0.5,    
    alchemyLv:    S.upgrades.alchemy||0,    
    enhanceLv:    S.upgrades.enhance||0,    
    mapLv:        S.upgrades.maproom||0,    
    boardLv:      S.upgrades.board||0,  
  };
}

function getHeroEffectiveStats(hero) {
  const bonus = getBonus();
  return {
    atk: Math.round(hero.atk * bonus.atkMult),
    spd: hero.spd * bonus.speedMult
  };
}

function rollEquipment(depth) {
  if(Math.random() > (0.2 + depth * 0.08)) return null;
  const roll = Math.random();
  let q = EQ_QUALITY[0];
  if(roll > 0.9) q = EQ_QUALITY[2];
  else if(roll > 0.6) q = EQ_QUALITY[1];
  return { id: "eq_" + Date.now(), name: "生鏽鐵劍", icon: "🗡️", quality: q.id, qualityName: q.name, equippedBy: null };
}

function guildLevel(){  
  if(S.fame>=300)return 5;  
  if(S.fame>=120)return 4;  
  if(S.fame>=50)return 3;  
  if(S.fame>=15)return 2;  
  return 1;
}

function isInjured(heroId){  
  if(!S.injuries||!S.injuries[heroId]) return false;  
  if(Date.now()>=S.injuries[heroId].until){delete S.injuries[heroId];return false;}  
  return true;
}

function applyInjury(heroId){  
  if(Math.random()>0.10) return;  
  const bonus=getBonus();  
  if(!S.injuries) S.injuries={};  
  const healTime=Math.max(30,120/bonus.healMult);  
  S.injuries[heroId]={until:Date.now()+healTime*1000};  
  const hero=(S.heroes||[]).find(function(h){return h.id===heroId;});  
  addLog('🩹 '+(hero?hero.name:'冒險者')+' 受傷了！'+Math.round(healTime)+'秒後恢復');
}

function idleHeroes(){  
  const busy=Object.values(S.activeQuests||{}).flat();  
  return (S.heroes||[]).filter(function(h){return !busy.includes(h.id)&&!isInjured(h.id);});
}

function addLog(msg){  
  const now=new Date();  
  const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');  
  if(!S.log)S.log=[];  
  S.log.unshift({t,msg});  
  if(S.log.length>80)S.log.pop();
}

async function saveGuild(){  
  try{    
    S.lastTick=Date.now();    
    await set(ref(db,'guilds/'+myName),S);    
    const t=new Date();    
    const ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0')+':'+t.getSeconds().toString().padStart(2,'0');    
    document.getElementById('sync-bar').textContent='✅ '+ts;  
  }catch(e){    
    document.getElementById('sync-bar').textContent='⚠️ 同步失敗';  
  }
}

function updateResourceDisplay(){  
  if(!S)return;  
  const bonus=getBonus();  
  const mageCount=(S.heroes||[]).filter(h=>h.cls==='法師').length;  
  document.getElementById('res-gold').textContent=fmt(S.gold);  
  document.getElementById('res-mana').textContent=fmt(S.mana);  
  document.getElementById('res-parts').textContent=fmt(S.parts);  
  document.getElementById('res-fame').textContent=fmt(S.fame);  
  document.getElementById('guild-fame-top').textContent=fmt(S.fame);  
  document.getElementById('guild-level').textContent=guildLevel();  
  document.getElementById('rate-gold').textContent=(S.heroes||[]).length>0?`+${((S.heroes||[]).length*0.1).toFixed(1)}/秒`:'';  
  document.getElementById('rate-mana').textContent=mageCount>0?`+${(mageCount*0.3*bonus.manaRateMult).toFixed(1)}/秒`:'';
}

function renderHeroes(){  
  if(!S)return;  
  const heroes=S.heroes||[];  
  const heroList=document.getElementById('hero-list');  
  const hireList=document.getElementById('hire-list');  
  if(heroes.length===0){    
    heroList.innerHTML='<div class="empty">還沒有冒險者，從下方雇用吧</div>';  
  }else{    
    heroList.innerHTML=heroes.map(h=>{      
      const questEntry=Object.entries(S.activeQuests||{}).find(([,ids])=>ids.includes(h.id));      
      if(questEntry){        
        const[dId]=questEntry;        
        const qData=S.questData&&S.questData[dId];        
        const d=DUNGEONS.find(x=>x.id===dId);        
        let progHtml='';        
        if(qData&&d){          
          const bonus=getBonus();          
          const elapsed=(Date.now()-qData.startTime)/1000;          
          const total=d.time/bonus.speedMult;          
          const pct=Math.min(100,elapsed/total*100);          
          progHtml=`<div class="progress-bar"><div class="progress-fill" style="width:${pct.toFixed(1)}%"></div></div><div class="progress-label">${d.icon} ${d.name} — 剩 ${Math.max(0,Math.ceil(total-elapsed))}秒</div>`;        
        }        
        const eff=getHeroEffectiveStats(h);      
        return `<div class="card"><div class="card-row"><div><div class="hero-name">${h.icon} ${h.name}</div><div class="hero-sub">${h.cls} · Lv${h.level} · 攻${eff.atk} · 速${eff.spd.toFixed(2)} · 經驗${h.xp}/${h.level*50}</div></div><span class="badge badge-quest">探索中</span></div>${progHtml}</div>`;      
      }      
      var effI=getHeroEffectiveStats(h);      
      var eqList=(S.inventory||[]).filter(function(x){return x.equippedBy===h.id;}).map(function(x){return x.icon+x.name;}).join(' ');      
      var injH=isInjured(h.id);      
      var injSec=S.injuries&&S.injuries[h.id]?Math.max(0,Math.ceil((S.injuries[h.id].until-Date.now())/1000)):0;      
      var hc='<div class="card"><div class="card-row"><div>';      
      hc+='<div class="hero-name">'+h.icon+' '+h.name+'</div>';      
      hc+='<div class="hero-sub">'+h.cls+' · Lv'+h.level+' · 攻'+effI.atk+' · 速'+effI.spd.toFixed(2)+'</div>';      
      if(eqList) hc+='<div style="font-size:10px;color:#666;margin-top:2px">'+eqList+'</div>';      
      hc+='</div>';      
      hc+=injH?'<span class="badge" style="background:#2e1a1a;color:#e05050;border:1px solid #5a2020">🩹 '+injSec+'秒</span>':'<span class="badge badge-idle">待命</span>';      
      hc+='</div>';      
      if(!injH) hc+='<div style="font-size:11px;color:#444;margin-top:6px">前往「地下城」頁籤組隊出發</div>';      
      hc+='</div>';      
      return hc;    }).join('');  
  }  
  const gl=guildLevel();  
  const hired=heroes.map(h=>h.id);  
  const available=HERO_TEMPLATES.filter(t=>!hired.includes(t.id)&&t.unlock<=gl-1);  
  if(heroes.length>=(S.heroSlots||4)){    
    hireList.innerHTML='<div class="empty">公會人數已滿，升級酒館以容納更多</div>';  
  }else if(available.length===0){    
    hireList.innerHTML='<div class="empty">提升聲望後解鎖更多冒險者</div>';  
  }else{    
    hireList.innerHTML=available.map(t=>{      
      const costStr=Object.entries(t.cost).map(([k,v])=>`${resPretty(k)}${v}`).join(' ');      
      const canAfford=Object.entries(t.cost).every(([k,v])=>S[k]>=v);      
      return `<div class="card"><div class="card-row"><div><div class="hero-name">${t.icon} ${t.name}</div><div class="hero-sub">${t.cls} · ${t.flavor}</div></div><button class="btn ${canAfford?'btn-gold':''}" ${canAfford?'':'disabled'} onclick="hireHero('${t.id}')">雇用 (${costStr})</button></div></div>`;    }).join('');  
  }
}

window.hireHero=function(id){  
  const t=HERO_TEMPLATES.find(x=>x.id===id);  
  if(!t)return;  
  if((S.heroes||[]).length>=(S.heroSlots||4)){alert('公會人數已滿！');return;}  
  for(const[k,v]of Object.entries(t.cost)){if(S[k]<v){alert(`${resPretty(k)}不足！`);return;}}  
  for(const[k,v]of Object.entries(t.cost)){S[k]-=v;}  
  if(!S.heroes)S.heroes=[];  
  S.heroes.push({id:t.id,name:t.name,cls:t.cls,icon:t.icon,atk:t.atk,spd:t.spd,level:1,xp:0});  
  addLog(`✅ 雇用了 ${t.icon} ${t.name}`);  
  saveGuild(); renderAll();
};

window.sendParty=function(dungeonId){  
  if((S.activeQuests||{})[dungeonId]){alert('此地下城已有探索中');return;}  
  const d=DUNGEONS.find(x=>x.id===dungeonId);  
  if(!d)return;  
  const idle=idleHeroes();  
  if(idle.length<d.req.heroCount){alert(`需要 ${d.req.heroCount} 名空閒冒險者`);return;}  
  const sorted=[...idle].sort((a,b)=>getHeroEffectiveStats(b).atk-getHeroEffectiveStats(a).atk);  
  const selectedIds=sorted.slice(0,d.req.heroCount).map(h=>h.id);  
  if(!S.activeQuests)S.activeQuests={};  
  if(!S.questData)S.questData={};  
  S.activeQuests[dungeonId]=selectedIds;  
  S.questData[dungeonId]={startTime:Date.now(),heroIds:selectedIds};  
  const names=selectedIds.map(id=>(S.heroes||[]).find(h=>h.id===id)?.name||'').join('、');  
  addLog(`🏃 ${names} 出發前往 ${d.icon} ${d.name}`);  
  saveGuild(); renderAll();
};

window.toggleAuto=function(id){
  if(!S.autoQuest) S.autoQuest={};
  S.autoQuest[id] = !S.autoQuest[id];
  renderAll();
};

function checkQuests(){  
  if(!S||!S.questData)return;  
  const bonus=getBonus();  
  let changed=false;  
  for(const[dId,qData]of Object.entries(S.questData)){    
    const d=DUNGEONS.find(x=>x.id===dId);    
    if(!d)continue;    
    const elapsed=(Date.now()-qData.startTime)/1000;    
    if(elapsed>=d.time/bonus.speedMult){      
      const heroIds=qData.heroIds||(S.activeQuests[dId]||[]);      
      heroIds.forEach(function(hid){applyInjury(hid);});      
      const gold=rnd(...d.loot.gold);      
      const mana=d.loot.mana?rnd(...d.loot.mana):0;      
      const parts=d.loot.parts?rnd(...d.loot.parts):0;      
      S.gold=Math.min(bonus.goldCap,S.gold+gold);      
      S.mana=Math.min(9999,S.mana+mana);      
      S.parts=Math.min(9999,S.parts+parts);      
      S.fame+=d.fameReward;      
      const heroNames=[];      
      for(const hid of heroIds){        
        const hero=(S.heroes||[]).find(h=>h.id===hid);        
        if(hero){          
          heroNames.push(hero.name);          
          hero.xp+=Math.round(d.xp*bonus.xpMult);          
          if(hero.xp>=hero.level*50){hero.xp-=hero.level*50;hero.level++;addLog(`⬆️ ${hero.name} 升到等級 ${hero.level}！`);}        
        }      
      }      
      if(S.autoQuest&&S.autoQuest[dId]){        
        qData.startTime=Date.now();        
        S.activeQuests[dId]=heroIds;      
      } else {        
        delete S.activeQuests[dId];        
        delete S.questData[dId];      
      }      
      const lootStr=[gold&&`💰${gold}`,mana&&`🧪${mana}`,parts&&`🔩${parts}`].filter(Boolean).join(' ');      
      const dungeonDepth=DUNGEONS.indexOf(d);      
      const dropped=rollEquipment(dungeonDepth);      
      if(dropped){        
        if(!S.inventory) S.inventory=[];        
        S.inventory.push(dropped);        
        addLog(`🎉 ${heroNames.join('、')||'隊伍'} 完成 ${d.name}！獲得 ${lootStr} ✨+${d.fameReward}`);        
        addLog(`✨ 掉落裝備：${dropped.icon}${dropped.name} [${dropped.qualityName}]`);      
      } else {        
        addLog(`🎉 ${heroNames.join('、')||'隊伍'} 完成 ${d.name}！獲得 ${lootStr} ✨+${d.fameReward}`);      
      }      
      changed=true;    
    }  
  }  
  if(changed){saveGuild(); renderAll();}
}

function renderDungeons(){  
  if(!S)return;  
  const bonus=getBonus();  
  document.getElementById('dungeon-list').innerHTML=DUNGEONS.map(d=>{    
    const locked=S.fame<d.req.fame;    
    const active=(S.activeQuests||{})[d.id];    
    const idle=idleHeroes();    
    const notEnough=!locked&&idle.length<d.req.heroCount;    
    const timeStr=Math.round(d.time/bonus.speedMult)+'秒';    
    const lootStr=Object.entries(d.loot).map(([k,[a,b]])=>`${resPretty(k)}${a}-${b}`).join(' ');    
    let progHtml='';    
    if(active){      
      const qData=S.questData&&S.questData[d.id];      
      if(qData){        
        const elapsed=(Date.now()-qData.startTime)/1000;        
        const total=d.time/bonus.speedMult;        
        const pct=Math.min(100,elapsed/total*100);        
        const heroIds=qData.heroIds||[];        
        const heroNames=heroIds.map(id=>(S.heroes||[]).find(h=>h.id===id)?.name||'').join('、');        
        progHtml=`<div class="progress-bar"><div class="progress-fill" style="width:${pct.toFixed(1)}%"></div></div><div class="progress-label">${heroNames} 探索中 — 剩 ${Math.max(0,Math.ceil(total-elapsed))}秒</div>`;      
      }    
    }    
    const statusHtml=active?'<span class="badge badge-quest">探索中</span>':locked?`<span style="font-size:11px;color:#444">需聲望${d.req.fame}</span>`:notEnough?`<span style="font-size:11px;color:#444">需${d.req.heroCount}人（空閒${idle.length}人）</span>`:'';    
    let partyBtn='';    
    const isAuto=S.autoQuest&&S.autoQuest[d.id];    
    if(!active&&!locked&&!notEnough){      
      const topHeroes=[...idle].sort((a,b)=>getHeroEffectiveStats(b).atk-getHeroEffectiveStats(a).atk).slice(0,d.req.heroCount);      
      const preview=topHeroes.map(h=>`${h.icon}${h.name}`).join('、');      
      partyBtn=`<div style="margin-top:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px"><span style="font-size:11px;color:#555">自動派遣：${preview}</span><div style="display:flex;gap:5px"><button class="btn ${isAuto?'btn-blue':''}" onclick="toggleAuto('${d.id}')">${isAuto?'🔁 自動':'🔁 點擊自動'}</button><button class="btn btn-gold" onclick="sendParty('${d.id}')">出發</button></div></div>`;    
    } else if(active){      
      partyBtn=`<div style="margin-top:6px;text-align:right"><button class="btn ${isAuto?'btn-blue':''}" onclick="toggleAuto('${d.id}')">${isAuto?'🔁 自動開啟':'🔁 自動關閉'}</button></div>`;    
    }    
    var dropPct=Math.round((0.2+DUNGEONS.indexOf(d)*0.08)*100);    
    var dropTag=getBonus().mapLv>0?`<span class="loot-tag">裝備 ${dropPct}%</span>`:'';    
    
    return `<div class="card" style="${locked?'opacity:0.4':''}"><div class="card-row"><div>
    <div class="hero-name">${d.icon} ${d.name}</div>
    <div class="hero-sub">${d.desc} · ${timeStr} · 需${d.req.heroCount}人</div></div>${statusHtml}</div>
    <div class="loot-row">${lootStr.split(' ').map(s=>`<span class="loot-tag">${s}</span>`).join('')}<span class="loot-tag">✨+${d.fameReward}</span>${dropTag}</div>
    ${progHtml}${partyBtn}</div>`;
  }).join('');
}

function renderUpgrades(){  
  if(!S) return;  
  var bonus=getBonus();  
  var html=UPGRADES.map(function(u){    
    var cur=S.upgrades[u.id]||0;    
    if(cur>=u.levels.length){      
      return `<div class="card"><div class="card-row"><div><div class="hero-name">${u.icon} ${u.name} <span style="font-size:10px;color:#4caf50">MAX</span></div><div class="hero-sub">${u.desc}</div></div></div></div>`;    
    }    
    var next=u.levels[cur];    
    var costStr=Object.entries(next.cost).map(function(e){return resPretty(e[0])+e[1];}).join(' ');    
    var canAfford=Object.entries(next.cost).every(function(e){return (S[e[0]]||0)>=e[1];});    
    return `<div class="card"><div class="card-row"><div><div class="hero-name">${u.icon} ${u.name} <span style="font-size:10px;color:#555">Lv${cur}→${cur+1}</span></div><div class="hero-sub">${u.desc}</div><div style="font-size:11px;color:#444;margin-top:3px">費用：${costStr}</div></div><button class="btn ${canAfford?'btn-gold':''}" ${canAfford?'':'disabled'} onclick="doUpgrade('${u.id}')">升級</button></div></div>`;  }).join('');  
  
  if(bonus.alchemyLv>0){    
    var mult=(1+bonus.alchemyLv*0.2).toFixed(1);    
    html+=`<div class="section-title" style="margin-top:14px">🧪 煉金工坊（效率 x${mult}）</div>
    <div class="card"><div style="font-size:12px;color:#666;margin-bottom:8px">每次兌換 100 單位：</div><div style="display:flex;flex-wrap:wrap;gap:6px">
    <button class="btn btn-blue" onclick="alchemyConvert('mana','gold',100)">🧪100→💰</button>
    <button class="btn btn-blue" onclick="alchemyConvert('parts','gold',100)">⚙️100→💰</button>
    <button class="btn btn-blue" onclick="alchemyConvert('gold','mana',100)">💰100→🧪</button>
    <button class="btn btn-blue" onclick="alchemyConvert('gold','parts',100)">💰100→⚙️</button>
    </div></div>`;  
  }  
  document.getElementById('upgrade-list').innerHTML=html;
}

window.doUpgrade=function(id){  
  const u=UPGRADES.find(x=>x.id===id);  
  const cur=S.upgrades[id]||0;  
  if(cur>=u.levels.length)return;  
  const next=u.levels[cur];  
  for(const[k,v]of Object.entries(next.cost)){if((S[k]||0)<v){alert(`${resPretty(k)}不足`);return;}}  
  for(const[k,v]of Object.entries(next.cost)){S[k]-=v;}  
  S.upgrades[id]=cur+1;  
  if(id==='tavern')S.heroSlots=(S.heroSlots||4)+2;  
  addLog(`🏛️ 升級了 ${u.icon} ${u.name} 至 Lv${cur+1}`);  
  saveGuild(); renderAll();
};

window.alchemyConvert=function(from, to, amt){
  if((S[from]||0) < amt) { alert("資源不足"); return; }
  S[from] -= amt;
  S[to] = (S[to]||0) + Math.round(amt * (1 + getBonus().alchemyLv*0.2));
  saveGuild(); renderAll();
};

function renderLogs(){
  const box = document.getElementById('log-box');
  if(!box || !S.log) return;
  box.innerHTML = S.log.map(l=>`<div class="log-entry"><span class="log-time">[${l.t}]</span>${l.msg}</div>`).join('');
}

function renderInventory(){
  const invList = document.getElementById('inventory-list');
  if(!invList) return;
  if(!S.inventory || S.inventory.length === 0){
    invList.innerHTML = '<div class="empty">倉庫空空如也</div>';
  } else {
    invList.innerHTML = S.inventory.map(i=>`<div class="eq-card"><div class="eq-name eq-${i.quality}">${i.icon} ${i.name} [${i.qualityName}]</div></div>`).join('');
  }
}

function renderAll(){
  updateResourceDisplay();
  if(activeTab==='heroes') renderHeroes();
  if(activeTab==='dungeon') renderDungeons();
  if(activeTab==='upgrade') renderUpgrades();
  if(activeTab==='equipment') renderInventory();
  if(activeTab==='log') renderLogs();
}

window.switchTab=function(tabId, el){
  activeTab = tabId;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  const panel = document.getElementById('tab-'+tabId);
  if(panel) panel.classList.add('active');
  renderAll();
};

window.enterGame=async function(){
  const input = document.getElementById('nickname-input').value.trim();
  if(!input) { alert("請輸入公會名稱"); return; }
  myName = input;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('my-guild-title').textContent = "⚔️ " + myName;

  const snapshot = await get(ref(db, 'guilds/' + myName));
  if(snapshot.exists()){
    S = snapshot.val();
  } else {
    S = defaultState(myName);
  }
  
  // 每秒動態產出與計時器
  setInterval(()=>{
    if(!S) return;
    const bonus = getBonus();
    const mageCount=(S.heroes||[]).filter(h=>h.cls==='法師').length;  
    S.gold = Math.min(bonus.goldCap, S.gold + (S.heroes||[]).length * 0.1);  
    S.mana = Math.min(9999, S.mana + mageCount * 0.3 * bonus.manaRateMult);
    checkQuests();
    updateResourceDisplay();
    if(activeTab === 'heroes' || activeTab === 'dungeon') renderAll();
  }, 1000);

  // 定期自動存檔
  setInterval(()=>{ saveGuild(); }, 10000);
  
  renderAll();
};
</script>
</body>
</html>
