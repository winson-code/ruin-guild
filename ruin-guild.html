<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廢墟公會</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
#login-screen h1{font-size:28px;font-weight:600;color:#c9a84c;letter-spacing:0.05em}
#login-screen p{font-size:14px;color:#888;margin-top:-8px}
#login-screen input{padding:10px 16px;font-size:15px;border-radius:8px;border:1px solid #333;background:#1a1a2e;color:#e0e0e0;width:240px;text-align:center}
#login-screen button{padding:10px 32px;font-size:15px;border-radius:8px;border:none;background:#c9a84c;color:#0f0f1a;font-weight:600;cursor:pointer}
#login-screen button:hover{background:#e0bc5e}
#game{display:none;max-width:760px;margin:0 auto;padding:12px}
.top-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #222}
.guild-title{font-size:18px;font-weight:600;color:#c9a84c}
.guild-sub{font-size:12px;color:#666;margin-top:2px}
.player-badge{font-size:12px;background:#1a1a2e;border:1px solid #333;padding:4px 10px;border-radius:99px;color:#aaa}
.res-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.res-card{background:#1a1a2e;border:1px solid #222;border-radius:8px;padding:8px 10px;text-align:center}
.res-label{font-size:10px;color:#666;margin-bottom:2px}
.res-val{font-size:15px;font-weight:600;color:#e0e0e0}
.res-rate{font-size:10px;color:#555;margin-top:1px}
.tabs{display:flex;gap:0;margin-bottom:12px;border:1px solid #222;border-radius:8px;overflow:hidden}
.tab{flex:1;padding:8px;font-size:13px;background:transparent;border:none;cursor:pointer;color:#666;transition:background 0.15s}
.tab.active{background:#1a1a2e;color:#c9a84c;font-weight:500}
.panel{display:none}.panel.active{display:block}
.section-title{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.card{background:#1a1a2e;border:1px solid #222;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.card-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hero-name{font-size:14px;font-weight:500;color:#e0e0e0}
.hero-sub{font-size:12px;color:#666;margin-top:2px}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500}
.badge-idle{background:#1a2e1a;color:#4caf50;border:1px solid #2d4a2d}
.badge-quest{background:#1a2040;color:#5b8dee;border:1px solid #2d3a60}
.btn{padding:5px 12px;font-size:12px;border:1px solid #333;border-radius:6px;background:transparent;cursor:pointer;color:#aaa;white-space:nowrap;transition:all 0.15s}
.btn:hover{background:#252535;color:#e0e0e0}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.btn-gold{background:#2a2010;color:#c9a84c;border-color:#4a3a10}
.btn-gold:hover:not(:disabled){background:#3a3015;color:#e0bc5e}
.btn-blue{background:#1a2040;color:#5b8dee;border-color:#2d3a60}
.btn-blue:hover:not(:disabled){background:#222d50}
.progress-bar{height:4px;background:#222;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:#5b8dee;border-radius:2px;transition:width 0.5s linear}
.progress-label{font-size:10px;color:#555;margin-top:3px}
.loot-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.loot-tag{font-size:10px;padding:2px 6px;background:#111;border-radius:4px;color:#666;border:1px solid #222}
.sync-bar{font-size:10px;color:#444;text-align:right;margin-bottom:6px}
.log-box{background:#111;border-radius:8px;padding:8px 10px;max-height:200px;overflow-y:auto}
.log-entry{font-size:12px;color:#666;line-height:1.8;border-bottom:1px solid #1a1a1a;padding:1px 0}
.log-entry:last-child{border-bottom:none}
.log-time{font-size:10px;color:#444;margin-right:6px}
.empty{font-size:13px;color:#444;text-align:center;padding:24px}
.alliance-section{margin-bottom:16px}
.player-guild-card{background:#111;border:1px solid #222;border-radius:10px;padding:10px 14px;margin-bottom:6px}
.pgc-name{font-size:13px;font-weight:500;color:#c9a84c}
.pgc-stats{font-size:11px;color:#555;margin-top:3px}
.alliance-project{background:#1a1a2e;border:1px solid #2d3050;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.ap-name{font-size:14px;font-weight:500;color:#5b8dee}
.ap-desc{font-size:12px;color:#555;margin-top:2px}
.ap-bar{height:6px;background:#111;border-radius:3px;overflow:hidden;margin-top:4px}
.ap-fill{height:100%;background:#5b8dee;border-radius:3px;transition:width 0.5s}
.ap-label{font-size:11px;color:#555;margin-top:3px;display:flex;justify-content:space-between}
.contrib-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.expedition-card{background:#1a1a2e;border:1px solid #2d3050;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.exp-name{font-size:14px;font-weight:500;color:#e0b060}
.exp-desc{font-size:12px;color:#555;margin-top:2px}
.exp-req{font-size:11px;color:#444;margin-top:4px}
.participant-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.participant-name{font-size:12px;color:#aaa}
.divider{border:none;border-top:1px solid #1a1a1a;margin:12px 0}
.eq-common{color:#aaa}.eq-rare{color:#5b8dee}.eq-epic{color:#c97eee}
.eq-card{background:#1a1a2e;border:1px solid #222;border-radius:10px;padding:10px 14px;margin-bottom:6px}
.eq-name{font-size:13px;font-weight:500}.eq-stat{font-size:11px;color:#666;margin-top:2px}
.eq-equipped{font-size:10px;color:#4caf50;margin-top:2px}
</style>
</head>
<body>

<div id="login-screen">
  <h1>⚔️ 廢墟公會</h1>
  <p>輸入你的公會名稱來開始遊戲</p>
  <input type="text" id="nickname-input" placeholder="公會名稱（例如：星辰公會）" maxlength="12">
  <button onclick="enterGame()">進入遊戲</button>
</div>

<div id="game">
  <div class="top-header">
    <div>
      <div class="guild-title" id="my-guild-title">⚔️ 我的公會</div>
      <div class="guild-sub">等級 <span id="guild-level">1</span> · 聲望 <span id="guild-fame-top">0</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="sync-bar" id="sync-bar">同步中...</div>
      <div class="player-badge" id="player-badge">玩家</div>
    </div>
  </div>

  <div class="res-bar">
    <div class="res-card"><div class="res-label">💰 金幣</div><div class="res-val" id="res-gold">0</div><div class="res-rate" id="rate-gold"></div></div>
    <div class="res-card"><div class="res-label">🧪 魔素</div><div class="res-val" id="res-mana">0</div><div class="res-rate" id="rate-mana"></div></div>
    <div class="res-card"><div class="res-label">🔩 零件</div><div class="res-val" id="res-parts">0</div></div>
    <div class="res-card"><div class="res-label">✨ 聲望</div><div class="res-val" id="res-fame">0</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('heroes',this)">🧙 冒險者</button>
    <button class="tab" onclick="switchTab('dungeon',this)">🏚️ 地下城</button>
    <button class="tab" onclick="switchTab('upgrade',this)">🏛️ 升級</button>
    <button class="tab" onclick="switchTab('equipment',this)">🗡️ 裝備</button>
    <button class="tab" onclick="switchTab('alliance',this)">🤝 聯盟</button>
    <button class="tab" onclick="switchTab('log',this)">📜 戰報</button>
  </div>

  <div id="tab-heroes" class="panel active">
    <div class="section-title">目前冒險者</div>
    <div id="hero-list"></div>
    <div class="section-title" style="margin-top:12px">雇用新冒險者</div>
    <div id="hire-list"></div>
  </div>
  <div id="tab-dungeon" class="panel">
    <div class="section-title">可探索地下城</div>
    <div id="dungeon-list"></div>
  </div>
  <div id="tab-upgrade" class="panel">
    <div class="section-title">公會設施</div>
    <div id="upgrade-list"></div>
  </div>
  <div id="tab-equipment" class="panel">
    <div class="section-title">倉庫</div>
    <div id="inventory-list"></div>
  </div>
  <div id="tab-alliance" class="panel">
    <div class="alliance-section">
      <div class="section-title">聯盟共同建造</div>
      <div id="alliance-projects"></div>
    </div>
    <hr class="divider">
    <div class="alliance-section">
      <div class="section-title">聯合遠征</div>
      <div id="expeditions"></div>
    </div>
    <hr class="divider">
    <div class="alliance-section">
      <div class="section-title">其他公會</div>
      <div id="other-guilds"></div>
    </div>
  </div>
  <div id="tab-log" class="panel">
    <div class="section-title">最近戰報</div>
    <div class="log-box" id="log-box"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuyxUGnWK6fwQ_1-p1GJIyQC7uqAUKtww",
  authDomain: "ruin-guide.firebaseapp.com",
  databaseURL: "https://ruin-guide-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ruin-guide",
  storageBucket: "ruin-guide.firebasestorage.app",
  messagingSenderId: "507865743667",
  appId: "1:507865743667:web:274094e94f049cfbbe7e46"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const HERO_TEMPLATES = [
  {id:"fighter",name:"鐵拳 葛雷",cls:"戰士",icon:"⚔️",atk:8,spd:1.0,cost:{gold:50},flavor:"老傷滿身，打架第一",unlock:0},
  {id:"mage",name:"星塵 米蘭",cls:"法師",icon:"🔮",atk:5,spd:0.8,cost:{gold:80,mana:20},flavor:"魔力過剩，偶爾走火",unlock:0},
  {id:"rogue",name:"暗影 柯爾",cls:"盜賊",icon:"🗡️",atk:6,spd:1.4,cost:{gold:100,mana:10},flavor:"安靜，出手快",unlock:1},
  {id:"healer",name:"聖光 艾娜",cls:"聖職者",icon:"💊",atk:3,spd:0.7,cost:{gold:120,mana:40},flavor:"補血永遠慢半拍",unlock:1},
  {id:"archer",name:"狂風 艾絲",cls:"弓箭手",icon:"🏹",atk:7,spd:1.2,cost:{gold:150,mana:30},flavor:"從不喊累",unlock:2},
  {id:"tank",name:"鐵壁 巴爾",cls:"聖騎士",icon:"🛡️",atk:4,spd:0.6,cost:{gold:200,mana:60,parts:20},flavor:"他的盾幾乎擋住一切",unlock:2},
];

const DUNGEONS = [
  {id:"cave",name:"幽暗洞窟",icon:"🦇",desc:"入門地下城",req:{heroCount:1,fame:0},time:15,loot:{gold:[5,15],mana:[0,5]},xp:10,fameReward:2},
  {id:"crypt",name:"古老地穴",icon:"💀",desc:"骷髏橫行的腐蝕地穴",req:{heroCount:2,fame:10},time:25,loot:{gold:[12,25],mana:[5,15],parts:[0,8]},xp:20,fameReward:5},
  {id:"dungeon",name:"廢棄礦坑",icon:"⛏️",desc:"深入地下，礦物豐富",req:{heroCount:2,fame:30},time:40,loot:{gold:[20,40],mana:[8,20],parts:[5,15]},xp:35,fameReward:8},
  {id:"tower",name:"魔法師之塔",icon:"🗼",desc:"扭曲空間，魔法陷阱",req:{heroCount:3,fame:60},time:60,loot:{gold:[30,60],mana:[20,50],parts:[5,20]},xp:60,fameReward:15},
  {id:"abyss",name:"深淵裂縫",icon:"🌑",desc:"古代惡魔沉睡之地",req:{heroCount:4,fame:120},time:90,loot:{gold:[60,120],mana:[40,80],parts:[20,40]},xp:100,fameReward:25},
];

const UPGRADES = [
  {id:"tavern",  name:"酒館擴建",   desc:"冒險者上限 +2",                 icon:"🍺", levels:[{cost:{gold:100}},{cost:{gold:300,mana:50}},{cost:{gold:600,mana:120,parts:30}}]},
  {id:"forge",   name:"鍛造工坊",   desc:"攻擊力 +20%",                   icon:"🔨", levels:[{cost:{gold:150,parts:20}},{cost:{gold:400,parts:60}},{cost:{gold:900,parts:150,mana:80}}]},
  {id:"library", name:"魔法圖書館", desc:"魔素生產 +50%",                 icon:"📚", levels:[{cost:{gold:200,mana:30}},{cost:{gold:500,mana:100}},{cost:{gold:1000,mana:200,parts:50}}]},
  {id:"scout",   name:"斥候小屋",   desc:"探索速度 +25%",                 icon:"🗺️", levels:[{cost:{gold:300,mana:40}},{cost:{gold:700,mana:100,parts:30}},{cost:{gold:1400,mana:200,parts:80}}]},
  {id:"clinic",  name:"醫療帳篷",   desc:"受傷恢復速度 +50%",             icon:"🏥", levels:[{cost:{gold:200,mana:30}},{cost:{gold:500,mana:80}},{cost:{gold:1000,mana:200,parts:40}}]},
  {id:"board",   name:"名聲布告欄", desc:"解鎖更多可雇用冒險者",         icon:"📣", levels:[{cost:{gold:150,fame:10}},{cost:{gold:400,fame:30}},{cost:{gold:800,fame:60}}]},
  {id:"alchemy", name:"煉金工坊",   desc:"解鎖資源兌換功能",             icon:"🧪", levels:[{cost:{gold:250,mana:50}},{cost:{gold:600,mana:120,parts:30}},{cost:{gold:1200,mana:250,parts:80}}]},
  {id:"maproom", name:"地圖室",     desc:"顯示地下城裝備掉落機率",       icon:"🗺️", levels:[{cost:{gold:180,parts:25}},{cost:{gold:450,parts:70}},{cost:{gold:900,parts:150,mana:60}}]},
  {id:"enhance", name:"裝備強化台", desc:"解鎖裝備強化（零件提升數值）", icon:"⚗️", levels:[{cost:{gold:300,parts:50}},{cost:{gold:700,parts:120,mana:50}},{cost:{gold:1400,parts:250,mana:120}}]},
  {id:"training",name:"訓練場",     desc:"待命冒險者自動獲得經驗值",     icon:"🎯", levels:[{cost:{gold:200,mana:40}},{cost:{gold:500,mana:100,parts:20}},{cost:{gold:1000,mana:200,parts:60}}]},
];

const ALLIANCE_PROJECTS = [
  {id:"wall",name:"聯盟城牆",icon:"🧱",desc:"所有公會防禦 +10%",totalParts:500,totalGold:200,effect:"全員探索速度 +10%"},
  {id:"portal",name:"傳送門",icon:"🌀",desc:"解鎖聯合遠征功能",totalMana:400,totalGold:300,effect:"解鎖聯合遠征"},
  {id:"shrine",name:"英雄神殿",icon:"🏯",desc:"所有冒險者經驗值 +25%",totalFame:100,totalGold:500,effect:"全員經驗值 +25%"},
];

const EXPEDITIONS = [
  {id:"dragon",name:"巨龍巢穴",icon:"🐉",desc:"需要多個公會合力討伐",minGuilds:2,time:120,loot:{gold:[200,400],mana:[100,200],parts:[50,100]},fameReward:50},
  {id:"titan",name:"古代巨人遺跡",icon:"🗿",desc:"傳說中的遺跡，單一公會無法攻克",minGuilds:3,time:180,loot:{gold:[400,800],mana:[200,400],parts:[100,200]},fameReward:100},
];

let myName='';
let S=null;
let activeTab='heroes';
let allGuilds={};
let allianceData={};

function defaultState(name){
  return {
    name,gold:100,mana:0,parts:0,fame:0,
    heroSlots:4,heroes:[],activeQuests:{},questData:{},
    upgrades:{tavern:0,forge:0,library:0,vault:0,scout:0},
    log:[],lastTick:Date.now(),autoQuest:{},
  };
}

function fmt(n){return Math.floor(n).toLocaleString();}
function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function resPretty(k){return{gold:'💰',mana:'🧪',parts:'🔩',fame:'✨'}[k]||k;}

function getBonus(){
  const ap=allianceData.projects||{};
  const wallDone=ap.wall&&ap.wall.done;
  const shrineDone=ap.shrine&&ap.shrine.done;
  return {
    atkMult:      1+(S.upgrades.forge||0)*0.2,
    manaRateMult: 1+(S.upgrades.library||0)*0.5,
    speedMult:    (1+(S.upgrades.scout||0)*0.25)*(wallDone?1.1:1),
    goldCap:      500000,
    xpMult:       shrineDone?1.25:1,
    healMult:     1+((S.upgrades.clinic||0)*0.5),
    trainXpRate:  (S.upgrades.training||0)*0.5,
    alchemyLv:    S.upgrades.alchemy||0,
    enhanceLv:    S.upgrades.enhance||0,
    mapLv:        S.upgrades.maproom||0,
    boardLv:      S.upgrades.board||0,
  };
};
  return {
    atkMult:1+(S.upgrades.forge||0)*0.2,
    manaRateMult:1+(S.upgrades.library||0)*0.5,
    speedMult:(1+(S.upgrades.scout||0)*0.25)*(ap.wall?.done?1.1:1),
    goldCap:500*Math.pow(2,S.upgrades.vault||0),
    xpMult:ap.shrine?.done?1.25:1,
  };
}

function guildLevel(){
  if(S.fame>=300)return 5;
  if(S.fame>=120)return 4;
  if(S.fame>=50)return 3;
  if(S.fame>=15)return 2;
  return 1;
}

function isInjured(heroId){
  if(!S.injuries||!S.injuries[heroId]) return false;
  if(Date.now()>=S.injuries[heroId].until){delete S.injuries[heroId];return false;}
  return true;
}
function applyInjury(heroId){
  if(Math.random()>0.10) return;
  const bonus=getBonus();
  if(!S.injuries) S.injuries={};
  const healTime=Math.max(30,120/bonus.healMult);
  S.injuries[heroId]={until:Date.now()+healTime*1000};
  const hero=(S.heroes||[]).find(function(h){return h.id===heroId;});
  addLog('🩹 '+(hero?hero.name:'冒險者')+' 受傷了！'+Math.round(healTime)+'秒後恢復');
}
function idleHeroes(){
  const busy=Object.values(S.activeQuests||{}).flat();
  return (S.heroes||[]).filter(function(h){return !busy.includes(h.id)&&!isInjured(h.id);});
}

function addLog(msg){
  const now=new Date();
  const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  if(!S.log)S.log=[];
  S.log.unshift({t,msg});
  if(S.log.length>80)S.log.pop();
}

async function saveGuild(){
  try{
    S.lastTick=Date.now();
    await set(ref(db,'guilds/'+myName),S);
    const t=new Date();
    const ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0')+':'+t.getSeconds().toString().padStart(2,'0');
    document.getElementById('sync-bar').textContent='✅ '+ts;
  }catch(e){
    document.getElementById('sync-bar').textContent='⚠️ 同步失敗';
  }
}

function offlineCalc(){
  const now=Date.now();
  const dt=Math.min((now-(S.lastTick||now))/1000,28800); // max 8hr
  if(dt<5){S.lastTick=now;return;}
  const bonus=getBonus();
  const mageCount=(S.heroes||[]).filter(h=>h.cls==='法師').length;
  S.gold=Math.min(bonus.goldCap,S.gold+(S.heroes||[]).length*0.1*dt);
  S.mana=Math.min(9999,S.mana+mageCount*0.3*bonus.manaRateMult*dt);

  // offline dungeon completion
  let totalGold=0,totalMana=0,totalParts=0,totalFame=0,runs=0;
  for(const[dId,qData] of Object.entries(S.questData||{})){
    const d=DUNGEONS.find(x=>x.id===dId);
    if(!d) continue;
    const elapsed=(now-qData.startTime)/1000;
    const tripTime=d.time/bonus.speedMult;
    if(elapsed>=tripTime){
      const completions=Math.floor(elapsed/tripTime);
      const heroIds=qData.heroIds||(S.activeQuests[dId]||[]);
      heroIds.forEach(function(hid){applyInjury(hid);});
      for(let i=0;i<completions;i++){
        const g=rnd(...d.loot.gold),m=d.loot.mana?rnd(...d.loot.mana):0,p=d.loot.parts?rnd(...d.loot.parts):0;
        totalGold+=g;totalMana+=m;totalParts+=p;totalFame+=d.fameReward;runs++;
        for(const hid of heroIds){
          const hero=(S.heroes||[]).find(h=>h.id===hid);
          if(hero){
            hero.xp+=Math.round(d.xp*bonus.xpMult);
            if(hero.xp>=hero.level*50){hero.xp-=hero.level*50;hero.level++;}
          }
        }
      }
      // check if auto-repeat
      const remaining=elapsed-(completions*tripTime);
      if(S.autoQuest&&S.autoQuest[dId]){
        qData.startTime=now-(remaining*1000);
      } else {
        delete S.activeQuests[dId];
        delete S.questData[dId];
      }
    }
  }
  if(runs>0){
    S.gold=Math.min(bonus.goldCap,S.gold+totalGold);
    S.mana=Math.min(9999,S.mana+totalMana);
    S.parts=Math.min(9999,S.parts+totalParts);
    S.fame+=totalFame;
    addLog(`💤 離線期間完成 ${runs} 趟探索！獲得 💰${totalGold} 🧪${totalMana} 🔩${totalParts} ✨${totalFame}`);
  }
  S.lastTick=now;
}

window.hireHero=function(id){

window.sendParty=function(dungeonId){
  if((S.activeQuests||{})[dungeonId]){alert('此地下城已有探索中');return;}
  const d=DUNGEONS.find(x=>x.id===dungeonId);
  if(!d)return;
  const idle=idleHeroes();
  if(idle.length<d.req.heroCount){alert(`需要 ${d.req.heroCount} 名空閒冒險者`);return;}
  const sorted=[...idle].sort((a,b)=>getHeroEffectiveStats(b).atk-getHeroEffectiveStats(a).atk);
  const selectedIds=sorted.slice(0,d.req.heroCount).map(h=>h.id);
  if(!S.activeQuests)S.activeQuests={};
  if(!S.questData)S.questData={};
  S.activeQuests[dungeonId]=selectedIds;
  S.questData[dungeonId]={startTime:Date.now(),heroIds:selectedIds};
  const names=selectedIds.map(id=>(S.heroes||[]).find(h=>h.id===id)?.name||'').join('、');
  addLog(`🏃 ${names} 出發前往 ${d.icon} ${d.name}`);
  saveGuild();renderAll(true);
};

function checkQuests(){
  if(!S||!S.questData)return;
  const bonus=getBonus();
  let changed=false;
  for(const[dId,qData]of Object.entries(S.questData)){
    const d=DUNGEONS.find(x=>x.id===dId);
    if(!d)continue;
    const elapsed=(Date.now()-qData.startTime)/1000;
    if(elapsed>=d.time/bonus.speedMult){
      const heroIds=qData.heroIds||(S.activeQuests[dId]||[]);
      heroIds.forEach(function(hid){applyInjury(hid);});
      const gold=rnd(...d.loot.gold);
      const mana=d.loot.mana?rnd(...d.loot.mana):0;
      const parts=d.loot.parts?rnd(...d.loot.parts):0;
      S.gold=Math.min(bonus.goldCap,S.gold+gold);
      S.mana=Math.min(9999,S.mana+mana);
      S.parts=Math.min(9999,S.parts+parts);
      S.fame+=d.fameReward;
      const heroNames=[];
      for(const hid of heroIds){
        const hero=(S.heroes||[]).find(h=>h.id===hid);
        if(hero){
          heroNames.push(hero.name);
          hero.xp+=Math.round(d.xp*bonus.xpMult);
          if(hero.xp>=hero.level*50){hero.xp-=hero.level*50;hero.level++;addLog(`⬆️ ${hero.name} 升到等級 ${hero.level}！`);}
        }
      }
      // auto-repeat or clear
      if(S.autoQuest&&S.autoQuest[dId]){
        qData.startTime=Date.now();
        S.activeQuests[dId]=heroIds;
      } else {
        delete S.activeQuests[dId];
        delete S.questData[dId];
      }
      const lootStr=[gold&&`💰${gold}`,mana&&`🧪${mana}`,parts&&`🔩${parts}`].filter(Boolean).join(' ');
      // equipment drop
      const dungeonDepth=DUNGEONS.indexOf(d);
      const dropped=rollEquipment(dungeonDepth);
      if(dropped){
        if(!S.inventory) S.inventory=[];
        S.inventory.push(dropped);
        const qCol=EQ_QUALITY.find(q=>q.id===dropped.quality)?.color||'#aaa';
        addLog(`🎉 ${heroNames.join('、')||'隊伍'} 完成 ${d.name}！獲得 ${lootStr} ✨+${d.fameReward}`);
        addLog(`✨ 掉落裝備：${dropped.icon}${dropped.name} [${dropped.qualityName}]`);
      } else {
        addLog(`🎉 ${heroNames.join('、')||'隊伍'} 完成 ${d.name}！獲得 ${lootStr} ✨+${d.fameReward}`);
      }
      changed=true;
    }
  }
  if(changed){saveGuild();renderAll(true);}
}

window.doUpgrade=function(id){
  const u=UPGRADES.find(x=>x.id===id);
  const cur=S.upgrades[id]||0;
  if(cur>=u.levels.length)return;
  const next=u.levels[cur];
  for(const[k,v]of Object.entries(next.cost)){if(S[k]<v){alert(`${resPretty(k)}不足`);return;}}
  for(const[k,v]of Object.entries(next.cost)){S[k]-=v;}
  S.upgrades[id]=cur+1;
  if(id==='tavern')S.heroSlots=(S.heroSlots||4)+2;
  addLog(`🏛️ 升級了 ${u.icon} ${u.name} 至 Lv${cur+1}`);

};

window.contributeProject=async function(projectId,resKey,amount){
  const{ref:fbRef,set:fbSet,get:fbGet}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
  if((S[resKey]||0)<amount){alert('資源不足');return;}
  S[resKey]-=amount;
  const contribRef=fbRef(db,`alliance/projects/${projectId}/contributions/${myName}/${resKey}`);
  const snap=await fbGet(contribRef);
  const cur=snap.exists()?snap.val():0;
  await fbSet(contribRef,cur+amount);
  const p=ALLIANCE_PROJECTS.find(x=>x.id===projectId);
  const allSnap=await fbGet(fbRef(db,`alliance/projects/${projectId}/contributions`));
  const allC=allSnap.val()||{};
  const needParts=Object.entries({gold:p.totalGold||0,mana:p.totalMana||0,parts:p.totalParts||0,fame:p.totalFame||0}).filter(([,v])=>v>0);
  let allDone=true;
  for(const[k,need]of needParts){
    let g=0;Object.values(allC).forEach(c=>{g+=(c[k]||0);});
    if(g<need){allDone=false;break;}
  }
  if(allDone)await fbSet(fbRef(db,`alliance/projects/${projectId}/done`),true);
  addLog(`🤝 ${myName} 貢獻了 ${resPretty(resKey)}${amount} 給 ${p.icon}${p.name}`);
  saveGuild();
};

window.joinExpedition=async function(expId){

window.startExpedition=async function(expId){
  const{ref:fbRef,update:fbUpdate}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");

function renderOtherGuilds(){
  const others=Object.entries(allGuilds).filter(([n])=>n!==myName);
  if(others.length===0){
    document.getElementById('other-guilds').innerHTML='<div class="empty">把遊戲連結分享給朋友吧！</div>';
    return;
  }
  document.getElementById('other-guilds').innerHTML=others.map(([name,g])=>{
    const gl=g.fame>=300?5:g.fame>=120?4:g.fame>=50?3:g.fame>=15?2:1;
    return `<div class="player-guild-card"><div class="card-row"><div><div class="pgc-name">⚔️ ${name}</div><div class="pgc-stats">冒險者 ${(g.heroes||[]).length} 人 · 聲望 ${fmt(g.fame||0)}</div></div><span style="font-size:11px;color:#555">等級 ${gl}</span></div></div>`;
  }).join('');
}

function renderLog(){
  const box=document.getElementById('log-box');
  if(!S.log||S.log.length===0){box.innerHTML='<div class="empty">尚無戰報</div>';return;}
  box.innerHTML=S.log.map(e=>`<div class="log-entry"><span class="log-time">${e.t}</span>${e.msg}</div>`).join('');
}

function renderAll(forceDungeon){
  if(!S)return;
  updateResourceDisplay();
  if(activeTab==='heroes')renderHeroes();
  else if(activeTab==='dungeon'&&forceDungeon)renderDungeons();
  else if(activeTab==='upgrade')renderUpgrades();
  else if(activeTab==='equipment')renderInventory();
  else if(activeTab==='alliance')renderAlliance();
  else if(activeTab==='log')renderLog();
}

window.switchTab=function(name,el){
  activeTab=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='dungeon')renderDungeons();
  else if(name==='equipment')renderInventory();
  else renderAll(false);
};


// ── Equipment system ──
const EQ_TYPES = [
  {id:'sword',name:'鐵劍',slot:'weapon',icon:'⚔️',stat:'atk',desc:'提升攻擊力'},
  {id:'axe',name:'戰斧',slot:'weapon',icon:'🪓',stat:'atk',desc:'提升攻擊力'},
  {id:'staff',name:'法杖',slot:'weapon',icon:'🪄',stat:'atk',desc:'提升攻擊力'},
  {id:'armor',name:'護甲',slot:'armor',icon:'🛡️',stat:'spd',desc:'提升探索速度'},
  {id:'boots',name:'疾風靴',slot:'armor',icon:'👢',stat:'spd',desc:'提升探索速度'},
  {id:'ring',name:'經驗戒指',slot:'accessory',icon:'💍',stat:'xp',desc:'提升經驗獲取'},
  {id:'amulet',name:'古老護符',slot:'accessory',icon:'🔮',stat:'xp',desc:'提升經驗獲取'},
];
const EQ_QUALITY = [
  {id:'common',name:'普通',color:'#aaa',mult:1.0,dropRate:0.5},
  {id:'rare',name:'稀有',color:'#5b8dee',mult:1.8,dropRate:0.3},
  {id:'epic',name:'史詩',color:'#c97eee',mult:3.0,dropRate:0.12},
];
const EQ_BASE_VALS = {atk:[2,5],spd:[0.05,0.15],xp:[0.15,0.35]};

function rollEquipment(dungeonDepth){
  const r=Math.random();
  // drop chance increases with dungeon depth
  const dropChance=0.2+dungeonDepth*0.08;
  if(Math.random()>dropChance) return null;
  // pick quality
  let qual=EQ_QUALITY[0];
  const qr=Math.random();
  if(qr<EQ_QUALITY[2].dropRate) qual=EQ_QUALITY[2];
  else if(qr<EQ_QUALITY[2].dropRate+EQ_QUALITY[1].dropRate) qual=EQ_QUALITY[1];
  // pick type
  const type=EQ_TYPES[Math.floor(Math.random()*EQ_TYPES.length)];
  const base=EQ_BASE_VALS[type.stat];
  const val=parseFloat(((base[0]+Math.random()*(base[1]-base[0]))*qual.mult).toFixed(2));
  return {
    id: Date.now()+'_'+Math.floor(Math.random()*9999),
    typeId:type.id, name:type.name, icon:type.icon,
    slot:type.slot, stat:type.stat, val,
    quality:qual.id, qualityName:qual.name,
    equippedBy:null
  };
}

function getHeroEffectiveStats(hero){
  const bonus=getBonus();
  let atkBonus=0, spdBonus=0, xpBonus=0;
  const inv=S.inventory||[];
  inv.filter(eq=>eq.equippedBy===hero.id).forEach(eq=>{
    if(eq.stat==='atk') atkBonus+=eq.val;
    if(eq.stat==='spd') spdBonus+=eq.val;
    if(eq.stat==='xp')  xpBonus+=eq.val;
  });
  return {
    atk: Math.round((hero.atk+atkBonus)*bonus.atkMult),
    spd: parseFloat((hero.spd+spdBonus).toFixed(2)),
    xpMult: bonus.xpMult+xpBonus,
  };
}

function renderInventory(){
  if(!S) return;
  const inv=S.inventory||[];
  const el=document.getElementById('inventory-list');
  if(inv.length===0){
    el.innerHTML='<div class="empty">倉庫是空的，去探索地下城獲得裝備吧！</div>';
    return;
  }
  const heroes=S.heroes||[];
  el.innerHTML=inv.map(eq=>{
    const qCol=EQ_QUALITY.find(q=>q.id===eq.quality)?.color||'#aaa';
    const equippedHero=eq.equippedBy?heroes.find(h=>h.id===eq.equippedBy):null;
    const statLabel={atk:'攻擊+',spd:'速度+',xp:'經驗+'}[eq.stat]||'';
    const heroOpts=`<option value="">-- 取下裝備 --</option>`+heroes.map(h=>`<option value="${h.id}" ${eq.equippedBy===h.id?'selected':''}>${h.icon}${h.name}</option>`).join('');
    var enhLv=eq.enhanceLevel||0;
    var enhCost=Math.floor(30*Math.pow(1.5,enhLv));
    var enhBtn=getBonus().enhanceLv>0?'<button class="btn btn-blue" style="font-size:10px;padding:3px 8px" onclick="enhanceItem(''+eq.id+'')">強化(⚙️'+enhCost+')</button>':'';
    var slotName=eq.slot==='weapon'?'武器':eq.slot==='armor'?'護甲':'飾品';
    var eqLine=equippedHero?'<div class="eq-equipped">裝備於：'+equippedHero.icon+equippedHero.name+'</div>':'';
    var out='<div class="eq-card"><div class="card-row"><div>';
    out+='<div class="eq-name" style="color:'+qCol+'">'+eq.icon+' '+eq.name+' <span style="font-size:10px">['+eq.qualityName+']'+(enhLv>0?' +'+enhLv:'')+'</span></div>';
    out+='<div class="eq-stat">'+statLabel+eq.val+' · '+slotName+'</div>'+eqLine+'</div>';
    out+='<div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">';
    out+='<select style="background:#111;color:#aaa;border:1px solid #333;border-radius:5px;padding:3px 6px;font-size:11px" onchange="equipItem(''+eq.id+'',this.value)">'+heroOpts+'</select>';
    out+=enhBtn+'<button class="btn" style="font-size:10px;padding:3px 8px" onclick="discardItem(''+eq.id+'')">丟棄</button>';
    out+='</div></div></div>';
    return out;
  }).join('');
}

window.equipItem=function(eqId,heroId){
  if(!S.inventory) return;
  const eq=S.inventory.find(x=>x.id===eqId);
  if(!eq) return;
  const slot=eq.slot;
  // unequip same slot from target hero
  if(heroId){
    S.inventory.forEach(x=>{
      if(x.equippedBy===heroId&&x.slot===slot&&x.id!==eqId) x.equippedBy=null;
    });
    eq.equippedBy=heroId;
    const hero=(S.heroes||[]).find(h=>h.id===heroId);
    addLog(`🗡️ ${hero?hero.name:'冒險者'} 裝備了 ${eq.icon}${eq.name}`);
  } else {
    eq.equippedBy=null;
  }
  saveGuild();
  renderInventory();
  if(activeTab==='heroes') renderHeroes();
};

window.discardItem=function(eqId){
  if(!S.inventory) return;
  S.inventory=S.inventory.filter(x=>x.id!==eqId);
  saveGuild();
  renderInventory();
};


window.alchemyConvert=function(from,to,amount){
  var bonus=getBonus();
  if(!bonus.alchemyLv){alert('需要先升級煉金工坊');return;}
  var rates={mana_gold:{fromKey:'mana',toKey:'gold',ratio:2},parts_gold:{fromKey:'parts',toKey:'gold',ratio:3},gold_mana:{fromKey:'gold',toKey:'mana',ratio:0.4},gold_parts:{fromKey:'gold',toKey:'parts',ratio:0.3},mana_parts:{fromKey:'mana',toKey:'parts',ratio:0.8}};
  var r=rates[from+'_'+to];if(!r)return;
  var outAmt=Math.floor(amount*r.ratio*(1+bonus.alchemyLv*0.2));
  if((S[r.fromKey]||0)<amount){alert(resPretty(r.fromKey)+'不足');return;}
  S[r.fromKey]-=amount;S[r.toKey]=Math.min(999999,(S[r.toKey]||0)+outAmt);
  addLog('🧪 煉金：'+resPretty(r.fromKey)+amount+' → '+resPretty(r.toKey)+outAmt);
  saveGuild();renderUpgrades();updateResourceDisplay();
};
window.enhanceItem=function(eqId){
  var bonus=getBonus();
  if(!bonus.enhanceLv){alert('需要先升級裝備強化台');return;}
  var eq=(S.inventory||[]).find(function(x){return x.id===eqId;});
  if(!eq)return;
  var cost=Math.floor(30*Math.pow(1.5,(eq.enhanceLevel||0)));
  if((S.parts||0)<cost){alert('需要 ⚙️'+cost+' 零件');return;}
  S.parts-=cost;eq.enhanceLevel=(eq.enhanceLevel||0)+1;
  eq.val=parseFloat((eq.val*1.15).toFixed(2));
  addLog('⚗️ 強化了 '+eq.icon+eq.name+' +'+eq.val);
  saveGuild();renderInventory();
};
window.toggleAuto=function(dungeonId){
  if(!S.autoQuest) S.autoQuest={};
  S.autoQuest[dungeonId]=!S.autoQuest[dungeonId];
  addLog(S.autoQuest[dungeonId]?`🔁 開啟 ${DUNGEONS.find(d=>d.id===dungeonId)?.name} 自動探索`:`⏹️ 關閉自動探索`);
  saveGuild();
  renderDungeons();
};
window.enterGame=async function(){
  const input=document.getElementById('nickname-input').value.trim();
  if(!input){alert('請輸入公會名稱');return;}
  myName=input;
  const snap=await get(ref(db,'guilds/'+myName));
  if(snap.exists()){
    S=snap.val();
    if(!S.questData)S.questData={};
    if(!S.upgrades)S.upgrades={tavern:0,forge:0,library:0,vault:0,scout:0};
  }else{
    S=defaultState(myName);
    addLog('🏰 '+myName+' 公會正式成立！');
    await saveGuild();
  }
  offlineCalc();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('player-badge').textContent=myName;
  document.getElementById('my-guild-title').textContent='⚔️ '+myName;

  onValue(ref(db,'guilds'),snap=>{
    allGuilds=snap.val()||{};
    if(activeTab==='alliance')renderAlliance();
  });
  onValue(ref(db,'alliance'),snap=>{
    allianceData=snap.val()||{};
    if(activeTab==='alliance')renderAlliance();
  });

  renderAll(true);
  setInterval(()=>{
    if(!S)return;
    const bonus=getBonus();
    const mageCount=(S.heroes||[]).filter(h=>h.cls==='法師').length;
    S.gold=Math.min(bonus.goldCap,S.gold+(S.heroes||[]).length*0.1);
    S.mana=Math.min(9999,S.mana+mageCount*0.3*bonus.manaRateMult);
    S.lastTick=Date.now();
    checkQuests();
    var b2=getBonus();
    if(b2.trainXpRate>0){idleHeroes().forEach(function(h){h.xp+=b2.trainXpRate;if(h.xp>=h.level*50){h.xp-=h.level*50;h.level++;addLog('🎯 '+h.name+' 在訓練場升到等級'+h.level+'！');}});}
    updateResourceDisplay();
  },1000);
  setInterval(()=>{if(activeTab==='heroes')renderHeroes();},3000);
  setInterval(saveGuild,20000);
};
</script>
